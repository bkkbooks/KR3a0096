body:
  text: 呻吟語摘跋家君之為呻吟語也歷塞暑五十餘䙫矣無論燕居獨處即堂署紛拿之際輪蹄馳驟之頃著疴床第之餘中夜夢醒之會遇有心得語輒録記之楮册不備則壁間牖下書面門屛金屑玉粒不一而足畏有見隨録而集之亦有偶得未及書而後乃遺忘者或偶書未及録而竟難尋覔者今以所集若干分類而續於呻吟語各欵之後人多未見畏欲續夀梨棗家君曰是書之刻也板先不一傳之頗廣第選擇弗精校讐弗慎終非全書胡可傳也爾既欲盍擇其最者先之乃手自刪削稿凡三易並其續入者僅餘十之二三題曰呻吟語摘畏乃躬督繕書手分句讀再刻之家藏視舊板不啻精且慎矣於戲琢磨功到而玉潤重輝淘汰力勤而金光增艷萬理畢具一貫在心得之則立地聖神何事求多於紙工弗得則終身陷溺奚貴徒涉於目中是刻也期與同志者共勉焉無負家君立言垂訓之意可已萬厯丙辰仲冬朔男吕知畏頓首謹跋
