body:
  text: 呻吟語摘儒家類提要臣等謹案呻吟語摘二卷明吕坤撰坤有四禮疑已著録明史藝文志載呻吟語凡四卷此止二卷考卷末萬厯丙辰其子知畏跋則此乃坤從四卷中手自删削並取知畏所續入者若干條存十之二三距萬厯壬辰郭子章作序之時又二十四年蓋坤晚年之定本也其內篇分七門曰性命曰存心曰倫理曰談道曰修身曰問學曰應務外篇分九門曰世運曰聖賢曰品藻曰治道曰人情曰物理曰廣喻曰詞章大抵不侈語精微而篤實以為本不虛談髙逺而踐履以為程在明代講學諸家似乎粗淺然尺尺寸寸務求規矩而又不違戾於情理視陸學末派之猖狂朱學末派之迂僻其得失則有閒矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀呻吟語摘序嘗讀孟子曰人恆過然後能改困於心衡於慮而後作徴於色發於聲而後喻說者謂中人之性非也豈以聖賢必無過乎成湯惟有慙德曰恐來世以貽為口實湯之作喻也而生於慚孔子曰邱也幸茍有過人必知之孔子之作喻也而生於過中丞新吾吕公故有呻吟語呻吟中丞之作喻所由生也曰呻吟寓言也言雖寓而道亦寓峻極於天地開闢混沌之變小人於早莫夭喬甘苦紅白榮悴之殊精徹於太一形化氣化之祖粗及於吹拂淋漓嚴凝流漓燔灼之跡上明堯舜周孔精一一貫之奧下闢佛老楊墨莊列申韓支離之書逺稽古先二帝三王風物之淳近著叔季徂詐爭競之僞細分居敬主靜理欲善惡之關顯設禮樂刑法功業之塗鴻纎並陳源流具論詳哉乎言之矣近儒談學者標其赤志曰主敬曰致良知曰隨處體認天理呻吟未嘗不語敬而曰執事敬未嘗不語良知而曰從親長致良知未嘗不語天理而曰於人事上存天理啜糟粕者孰與醲醇之㫖而謂醲醇不釀於糟粕不可肥膚革者孰與神氣之王而謂神氣不宅於膚革不可夫婦之愚可以與知良知也及其至雖聖人亦有所不知焉聖而不可知之神也而謂不可知不出於夫婦之與知不可夫婦之不肖可以能行良能也及其至雖聖人亦有所不能焉中庸不可能也而謂不可能不出於夫婦之與能不可此呻吟之大都也世方索隱行怪吾夫子語中庸世方歸楊墨悅鄉願孟子語君父反經世方佞佛昌黎語原道世方習元同尚禪那呻吟語綱常事物呻吟非徒自作自喻將以激濁立懦啓迷導誤作人之作喻人之喻以偕之大道辟之長桑之禁方陽慶之竒咳無獨長生繄起死人而肉白骨也子章事公晋陽公氷蘗自規取與慎一介而兼懷萬彚靡所畛域問民疾苦膏盲泣若下車任若內溝醜不若古人而哀不已若者必欲維之以身登之於岸卧之袵席而後已程伯子曰醫書以手足痿痺為不仁仁者渾然與天地萬物為一體知伯子之痿痺則知公之呻吟矣子章乃原公呻吟作喻之機推公呻吟宇宙之志而槩之曰公之自病也病道之弗明弗行而其病天下也病吾之疲癃顛連而無告者也奈之何不呻以吟也萬歷二十年壬辰秋後學郭子章頓首拜撰
