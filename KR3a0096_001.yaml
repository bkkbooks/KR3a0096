body:
  text: 呻吟語摘卷上明吕坤撰內篇性命真機真味要涵蓄休㸃破其妙無窮不可言喻所以聖人無言一犯口頰窮年說不盡又離披澆漓無一些咀嚼處矣性分不可使虧歉故其取數也常多曰窮理曰盡性曰達天曰入神曰致廣大極高明情欲不可使贏餘故其取數也常少曰謹言曰慎行曰約已曰清心曰節飲食寡嗜欲凡人光明博大渾厚含蓄是天地之氣溫煦和平是陽春之氣寬縱任物是長夏之氣嚴凝斂約喜刑好殺是秋之氣沈藏固嗇是冬之氣暴怒是震雷之氣狂肆是疾風之氣昏惑是霾霧之氣隱恨留連是積隂之氣從容溫潤是和風甘雨之氣聰明洞達是青天朗月之氣有所鍾者必有所似蘭以火而香亦以火而滅膏以火而明亦以火而竭炮以火而聲亦以火而泄隂者所以存也陽者所以亡也豈獨聲色氣味然哉世知鬱者之為足是為萬年之燭一則見性兩則生情人未有偶而能靜者物未有偶而無聲者聲無形色寄之於器火無體質寄之於薪色無著落寄之草木故五行惟火無體而用不窮問禽獸草木亦有性否曰有其性亦天命否曰天以隂陽五行化生萬物安得非天命或問孔子教人性非所先曰聖人開口處都是性夫水無渣著土便濁火無氣著木便烟性無二著氣質便雜滿方寸渾成一個德性無分毫私欲便是一心之仁六尺渾成一個冲和無分毫病痛便是一身之仁滿六合渾成一個身軀無分毫間隔便是合天下以成其仁仁是全體無毫髮缺缺仁是純體無纖芥瑕疵仁是天成無些子造作衆人分一心為胡越聖人㑹天下以成其身愚嘗謂兩間無物我萬古一呼吸存心收放心休要如追放豚既入苙了便要使他從容閒暢無拘迫懊憹之狀若恨他難收一向束縛在此與放失同何者同歸於無得也故再放便奔逸不可收拾君子之心如習鷹馴雉搏擊飛騰主人略不防間及上臂歸庭却恁忘機自得略不驚畏心放不放要在邪正上說不在出入上說且如高卧山林遊心廊廟身處衰世夢想唐虞遊子思親貞婦懷夫這是個放心否若不論邪正只較出入却是禪定之學或問放心如何收余曰只君此問便是收了這放收甚容易才昏昏便出去無屋漏工夫做不得宇宙事業君子口中無慣語存心故也故曰修辭立其誠不誠何以修辭靜之一字十二時離不了一刻才離便亂了門盡日開闔樞常靜妍媸盡日往來鏡常靜人盡日應酬心常靜惟靜也故能張主得動若逐而去應事定不分曉便是睡時此念不靜作個夢兒也胡亂把意念沈潛得下何理不可得把志氣奮發得起何事不可做今之學者將個浮躁心觀理將個委靡心臨事只糢糊過了一生心平氣和此四字非涵養不能做工夫只在個定水火定則百物兼照萬事得理水明而火昏靜屬水動屬火故病人火動則躁擾狂越及其蘇定渾不能記蘇定者水澄清而火熄也故人非火不生非火不死事非火不濟非火不敗惟君子善處火故身安而德滋未有甘心快意而不殃身者惟理義之悅我心却步步是安樂境自家好處掩藏幾分這是涵蓄以養深别人不好處要掩藏幾分這是渾厚以養大胸中情景要看得春不是繁華夏不是發暢秋不是寥落冬不是枯槁方為我境目不容一塵齒不容一芥非我固有也如何靈臺內許多荆榛却自容得不存心看不出自家不是只於動靜語默接物應事時件件想一想便見渾身都是過失須動合天則然後為是日用間如何疏忽得一時學者思之心相信則迹者土苴也何煩語言相疑則迹者媒孽也益生猜二故有誓心不足自明避嫌反成自誣者相疑之故也是故心一而迹萬故君子治心不修迹中孚治心之至也豚魚且信何疑之有忍激二字是禍福關學者只多欣喜心便不是凝道之器只脫盡輕薄心便可達天德漢唐以下儒者脫盡此二字不多人惡惡太嚴便是一惡樂善甚急便是一善投佳果於便溺濯而獻之食乎曰不食不見而食之病乎曰不病隔山而指罵之聞乎曰不聞對面而指罵之怒乎曰怒此見聞障也夫能使見而食聞而不怒雖入黑海蹈白刃可也此鍊心者之所當知也屬纊之時般般都帶不得惟是帶得此心却教壞了是空身歸去矣可為萬古一恨暮夜無知此四字百惡之總根也人之罪莫大於欺欺者利其無知也大姦大盜皆自無知之心充之天下大惡只有二種欺無知不畏有知欺無知還是有所忌憚心此是誠僞關不畏有知是個無所忌憚心此是死生關猶知有畏良心尚未死也只大公了便是包涵天下氣象古人也算一箇人我輩成底是甚麼人若不愧不奮便是無志聖狂之分只在茍不茍兩字恕心養到極處只看得世間人都無罪過說不得真知明見一些涵養不到發出來便是本象倉卒之際自然掩護不得憂世者與忘世者談忘世者笑忘世者與憂世者談憂世者悲嗟夫六合骨肉之淚肯向一室胡越人哭哉彼且謂我為病狂而又安能自知其喪心哉得之一字最壞此心不但鄙夫患得年老戒得為不可只明其道而計功有事而正心先事而動得心先難而動獲心便是雜霸雜夷一念不極其純萬善不造其極此作聖者之大戒也充一箇公己公人心便是胡越一家任一箇自私自利心便是肝膽胡越天下興亡國家治亂萬姓死生只爭這箇些子為人辨寃白謗是第一天理沈靜非緘默之謂也意淵涵而態閒正此謂真沈靜雖終日言語或千軍萬馬中相攻擊或稠人廣衆中應繁劇不害其為沈靜神定故也一有飛揚動擾之意雖端坐終日寂無一語而色貌自浮或意雖不飛揚動擾而昏昏欲睡皆不得謂沈靜真沈靜底自是性總包一段全副精神在裏室中之鬭市上之爭彼所據各有一方也一方之見皆是已非人而濟之以不相下之氣故寧死而不平嗚呼此猶愚人也賢臣之爭政賢士之爭理亦然此言語之所以日多而後來者益莫知所決擇也故為下愚人作法制易為士君子所折衷難非斷之難而服之難也根本處在不見心而任口恥屈人而好勝是室人市兒之見也知識帝則之賊也惟忘知識以任帝則此謂天真此謂自然一著念便乖違愈著念愈乖違乍見之心歇息一刻别是一箇光景或問虛靈二字如何分别曰惟虛故靈頑金無聲鑄為鐘磬則有聲鐘磬有聲實之以物則無聲聖心無所不有而一無所有故感而遂通天下之故學者不在自家心上做工夫只在人心做工夫便錯此心常要適雖是憂勤惕勵中困窮抑鬱際也要有這般胸次不怕來濃艷只怕去沾戀原不萌芽說甚生機用三十年心力除一箇僞字不得或曰君儘尚實矣余曰所謂僞者豈必在言行間哉實心為民雜一念德我之心便是僞實心為善雜一念求知之心便是僞道理上該做十分只爭一毫未滿足便是僞汲汲於向義才有二三心便是僞白晝所為皆善而夢寐有非僻之干便是僞心中有九分外面做得恰象十分便是僞此獨覺之僞也余皆不能去恐漸潰防間延惡於言行間耳人生在天地間無日不動念就有箇動念底道理無日不說話就有箇說話底道理無日不處事就有箇處事底道理無日不接人就有箇接人底道理無日不理物就有箇理物底道理以致怨怒笑歌傷悲感歎顧盼指示咳唾涕洟隱微委曲造次顛沛疾病危亡莫不各有道理只是時時體認件件講求細行小物尚求合則彞倫大節豈可踰間故始自垂髫終於屬纊持一箇自强不息之心通乎晝夜要之於純一不已之地忘乎死生此還本歸全之道戴天履地之宜不然恣情縱意而各求遂其所欲凡有知覺運動者皆然無取於萬物之靈矣或曰有要乎曰有其要只在存心心何以存曰只在主靜只靜了千酬萬應都在道理上事事不錯一念孳孳惟善是圖曰正思一念孳孳惟欲是願曰邪思非分之福期望太高曰越思先事徘徊後事懊恨曰縈思遊思千里岐慮百端曰浮思事無可疑當斷不斷曰惑思事不涉己為他人憂曰狂思無可奈何當罷不罷曰徒思日用職業本分工夫朝惟暮圖期無曠廢曰本思此九思者日用之間不在此則在彼善攝心者其惟本思乎身有定業日有定務暮則省白晝之所行朝則計今日之所事念兹在兹不肯一事茍且不肯一時放過庶心有著落不得他適而德業日有長進矣耳目之玩偶當於心得之則喜失之則悲此兒女子常態也世間甚物與我相關而以得喜以失悲耶聖人看得此身亦不關悲喜是吾道之一囊槖耳愛囊槖之所受者不以囊槖易所受如之何以囊槖棄所受也而况耳目之玩又囊槖之外物乎道義心胸發出來自無暴戾氣象怒也怒得有禮若說聖人不怒聖人只是六情定靜安慮聖人胸中無一刻不如此或曰喜怒哀樂到面前何如曰只恁喜怒哀樂定靜安慮胸次無分毫加損倫理爵䘵恩寵聖人未嘗不以為榮聖人非以此為加損也朝廷重之以示勸而我輕之以示高是與君忤也是窮君鼓舞天下之權也故聖人雖不以爵祿恩寵為榮而未嘗不榮之以重帝王之權以示天下帝王之權之可重此臣道也孝子之事親也上焉者先意其次承志其次共命共命則親有未言之志不得承也承志則親有未萌之意不得將也至於先意而悅親之道至矣或曰安得許多心思能推至此乎曰事親者以悅親為事者也以悅親為事則孳孳皇皇無以尚之者只是這箇念頭親有多少意志終日體認不得門户可以託父兄而喪德辱名非父兄所能庇生育可以由父母而求疾蹈險非父母所得由為人子弟者不可不知繼母之虐嫡妻之妒古今以為恨者也而前子不孝丈夫不端則舍然不問焉世情之偏也久矣懷非母之迹而因以生嫌借恃父之名而無端造謗怨讟忤逆父亦被誣者世豈無耶恣淫狎之性而恩重緑絲挾城社之威而侮及黃裏谷風柏舟妻亦失所者世豈無耶惟子孝夫端然後繼母嫡妻無辭於姻族矣居官不可不知閨門之中少了箇禮字便自天翻地覆百禍千殃身亡家破皆從此起責人到閉口捲舌面赤背汗時猶刺刺不已豈不快心然淺隘刻薄甚矣故君子攻人不盡其過須含蓄以餘人之愧懼令其自新方有趣味是謂以善養人恩禮出於人情之自然不可强致然禮係體面猶可責人恩出於根心反以責而失之矣故恩薄可結之使厚恩離可結之使固一相責望為怨滋深故父子兄弟夫婦之間使骨肉為寇讐皆坐責之一字耳宋儒云宗法明而家道正豈惟家道將天下之治亂恆必由之宇宙內無有一物不相貫屬不相統攝者人以一身統四肢一肢統五指木以株統幹以幹統枝以枝統葉百穀以莖統穗以穗統􅀈以􅀈統粒蓋同根一衇聯屬成體此操一舉萬之術而治天下之要道也天子統六卿六卿統九牧九牧統郡邑郡邑統鄉正鄉正統宗子事則以次責成恩則以次流布教則以次傳宣法則以次繩督夫然後上不勞下不亂而政易行自宗法廢而人各為身家各為政彼此如飄絮飛沙不相維繫是以上勞而無要領可持下散而無脈胳相貫姦盜易生而難知教化易格而難達故宗法立而百善興宗法廢而萬事弛或曰宗子而賤而弱而幼而不肖何以統宗曰古之宗法也如封建世世以適長適長不得人則一宗受其敝且豪强得以豚鼠視宗子而魚肉孤弱其誰制之蓋有宗子又當立宗長宗子以世世長子孫為之宗長以闔族之有德望為衆所推服能佐宗子者為之胥重其權而互救其失此二者宗人一委聽焉則有司有所責成而紀法易於修舉矣母氏聖善我無令人孝子不可不知臣罪當誅兮天王聖明忠臣不可不知士大夫以上有祠堂有正寢有客位祠堂有齊房神庫四世之祖考居焉先世之遺物藏焉子孫立拜之位在焉犧牲鼎俎盥尊之器物陳焉堂上堂下之樂列焉主人之周旋升降由焉正寢吉禮則生忌之考妣遷焉凶禮則尸柩前之食案香几衣冠設焉朝夕哭奠之位容焉柩旁床帳諸器之陳設五服之喪次男女之哭位分焉堂外弔奠之客祭器之羅列在焉客位則將葬之遷柩宿焉冠禮之曲折男女之醮位賓客之宴饗行焉此三所者皆有兩階皆有位次故居室寧陋而四禮之所斷乎其不可陋近見名公有以旋馬容膝繩樞甕牖為清節高品者余甚慕之而愛禮一念甚於愛名故力可勉為不嫌宏裕敢為大夫以上者告焉朝廷之上紀綱定而臣民可守是曰朝常公卿大夫百司庶官各有定法可使持循是曰官常一門之內父子兄弟長幼尊卑各有條理不變不亂是曰家常飲食起居動靜語默擇其中正者守而勿失是曰身常得其常則治失其常則亂未有茍且冥行而不取敗者也人心喜則志意暢達飲食多進而不傷血氣沖和而不鬱自然無病而體充身健安得不夀故孝子之於親也終日乾乾惟恐有一毫不快事到父母心頭自家既不惹起外觸又極防間無論貧富貴賤常變順逆只是以悅親為主蓋悅之一字乃事親者第一傳心口訣也即不幸而親有過亦須在悅字上用工夫幾諫積誠耐煩留意委曲方略自有回天妙用若直諍以甚其過暴棄以增其怒不悅莫大焉故曰不順乎親不可以為子郊社報天地生成之大德也然災沴有禳順成有祈君為私田則仁民為公田則忠不嫌於求福不嫌於免禍子孫之祭先祖以追養繼孝也自我祖父母以有此身也曰賴先人之澤以享其餘慶也曰吾朝夕奉養承歡而一旦不復獻杯棬心悲思而無寄故祭薦以伸吾誠也曰吾貧賤不足以供菽水今鼎食而親不逮心悲思而莫及故祭薦以志吾悔也豈為其遊魂虛位能福我而求之哉求福已非君子之意而以一飯之設數拜之勤求福於先人仁孝誠敬之心果如是乎不謀利不責報不望其感激雖在他人猶然而况我先人乎詩之祭必言福而楚茨諸詩為尤甚豈可為訓耶吾獨有取於采蘩采蘋二詩盡物盡志以達吾子孫之誠敬而已他不及也明乎此道則天下萬事萬物皆盡我所當為禍福利害皆聽其自至人事修而外慕之心息向道專而作輟之念忘矣何者明於性分而無所冀幸也友道極關係故與君父並列而為五人生德業成就少朋友不得君以法行治我者也父以恩行不責善者也兄弟怡怡不欲以切偲傷愛婦人主內事不得相追隨規過子雖敢諍終有可避之嫌至於對嚴師則矜持收斂而過無可見在家庭則狎眤親習而正言不入惟夫朋友者朝夕相與既不若師之進見有時情禮無嫌又不若父子兄弟之言語有忌一德虧則友責之一業廢則友責之美則相與奬勸非則相與匡救日更月變互感交摩駸駸然不覺其勞且難而入於君子之域矣是朋友者四倫之所賴也嗟夫斯道之亡久矣言語嬉媟樽俎嫗煦無論事之善惡以順我者為厚交無論人之姦賢以敬我者為君子躡足附耳自謂知心接膝拍肩濫許刎頸大家同陷於小人而不知可哀也已是故物相反者相成見相左者相益孔子取友曰直諒多聞此三友者皆與我不相附㑹者也故曰益是故得三友難能為人三友更難天地間不論天南地北縉紳草莽得一好友道同志合亦人生一大快也談道廟堂之樂淡之至也淡則無欲無欲之道與神明通素之至也素則無文無文之妙與本始通至道之妙不可意思如何可言可以言皆義之淺也𤣥之又𤣥猶龍公亦說不破蓋公亦囿於𤣥𤣥之中耳要說說箇甚然却只在匹夫匹婦共知共行之中外了這箇便是虛無除了箇中字更定道統不得旁流之至聖不如正路之賢人故道統寧中絶不以旁流繼嗣何者氣脈不同也豫嘗曰寧為道統家奴婢不為旁流家宗子中之一字是無天於上無地於下無東西南北於四方此是南面獨尊道中的天子仁義禮智信都是東西侍立百行萬善但少了這箇都是一家貨更成甚麼道理愚不肖者不能任道亦不能賊道賊道全是賢智後世無識之人不察道之本然面目示天下以大中至正之矩而但以賢智者為標的世間有了賢智便看的中道尋常無以過人不起名譽遂薄中道而不為道之壞也不獨賢智者之罪而推崇賢智者其罪亦不小矣中庸為賢智而作也中定矣又下箇庸字㫖深哉此難與曲局之士道道者天下古今共公之理人人都有分的道不自私聖人不私道而儒者每私之曰聖人之道言必循經事必稽古曰衛道嗟夫此千古之大防也誰敢決之然道無津涯非聖人之言所能限事有時勢非聖人之制所能盡後世茍有明者出發聖人所未發而默契聖人欲言之心為聖人所未為而吻合聖人必為之事此固聖人之深幸而拘儒之所大駭也嗚呼此可與通者道漢唐以來鮮若人矣易道渾身都是滿眼都是盈六合都是三百八十四爻聖人特拈起三百八十四事來做題目使千聖作易人人另有三百八十四說都外不了那隂陽道理後之學者求易於易穿鑿附㑹以求通不知易是箇活的學者看做死的易是箇無方體的學者看做有定象的故論簡要乾坤二卦已多了論窮理雖萬卷書說不盡易的道理何止三百八十四爻五色勝則相掩然必厚益之猶不能渾然無迹維黑一染不可辨矣故黑者萬事之府也斂藏之道也帝王之道黑故能容保無疆聖人之心黑故能容㑹萬里蓋含英采韜精明養元氣蓄大機皆黑之道也故曰惟𤣥惟默𤣥黑色也默黑象也書稱舜曰𤣥德升聞老子曰知其白守其黑得黑之精者也故外著而不可掩皆道之淺者也雖然儒道內黑而外白黑為體白為用老氏內白而外黑白安身黑善世道在天地間不限於取數之多心力勤者得多心力衰者得少昏弱者一無所得假使天下皆聖人道亦足以供其求茍皆為盜跖道之本體自在也分毫無損畢竟是世有聖人道斯有主道附聖人道斯有用或問中之道堯舜傳心必有至𤣥至妙之理余嘆曰只就我兩人眼前說這飲酒不為限量不至過醉這就是飲酒之中這說話不緘默不狂誕這就是說話之中這作揖跪拜不煩不疏不疾不徐這就是作揖跪拜之中一事得中就是一事的堯舜推之萬事皆然又到那安行處便是十全的堯舜形神一息不相離道氣一息不相無故道無精粗言精粗者妄也因與一客共酌指案上羅列者謂之曰這安排必有停妥處是天然自有底道理那僮僕見一豆上案將滿案尊俎東移西動莫知措手那熟底入眼便有定位未來便有安排新者近前舊者退後飲食居左匙箸居右重積不相掩參錯不相亂布置得宜楚楚齊齊這箇是粗底若說神化性命不在此却在何處若說這裏有神化性命這箇工夫還缺缺否推之耕耘簸揚之夫炊爨烹調之婦莫不有神化性命之理都能到神化性命之極學者把神化性命看得太𤣥把日用事物看得太粗原不曽理㑹理㑹得來這案上羅列得天下古今萬事萬物都在這裏橫竪推行撲頭蓋面腳踏身坐底都是神化性命乃知神化性命極粗淺底靜中看天地萬物都無些子儒者之末流與異端之末流何異似不可以相誚也故明於醫可以攻病人之標本精於儒可以中邪說之膏肓闢邪不得其情則邪愈肆攻疾不對其症則病愈劇何者授之以話柄而借之以反攻自救之䇿也七情總是箇欲只得其正了都是天理五性總是箇仁只不仁了都是人欲莊列見得道理原著不得人為故一向不盡人事不知一任自然成甚世界聖人明知自然却把自然閣起只說箇當然聽那箇自默氣盛便不見涵養浩然之氣雖充塞天地間其實本體間定冉冉口鼻中不足以呼吸以吾身為內則吾身之外皆外物也故富貴利達可生可榮茍非道焉而君子不居以吾心為內則吾身亦外物也故貧賤憂戚可辱可殺茍道焉而君子不辭滿腔子是惻隱之心滿六合是運惻隱之心處君子於六合飛潛動植纖細毫末之物見其得所則油然而喜與自家得所一般見其失所則閔然而戚與自家失所一般位育念頭如何一刻放得下人一生不聞道真是可憐天德只是箇無我王道只是箇愛人凡動天感物皆純氣也至剛至柔與中和之氣皆有所感動純故也十分純裏才有一毫雜便不能感動無論佳氣戾氣只純了其應便捷於影響萬事萬物有分别聖人之心無分别因而付之耳譬之日因萬物以為影水因萬川以順流而日水原無兩未嘗不分别而非以我分别之也以我分别自是分别不得下學學箇甚麼上達達箇甚麼下學者學其所達也上達者達其所學也六經言道而不辨辨自孟子始漢儒解經而不論論自宋儒始宋儒尊理而不僭僭自世儒始知彼知我不獨是兵法處人處事一些少不得底談道者雖極精切須向苦心人說可使手舞足蹈可使大呌垂泣何者以求通未得之心聞了然透徹之語如饑得珍羞如旱得霖雨相悅以解妙不容言其不然者如麻木之肌針灸終日尚不能覺而以爪搔之安知痛癢哉吾竊為言者惜也故大道獨契至理不言非聖賢之忍於棄人徒嘵嘵無益是以聖人待問而後言猶因人而就事人皆知異端之害道而不知儒者之言亦害道也見理不明似是而非或騁浮詞以亂真或執偏見以奪正或狃目前而昧萬世之常經或徇小道而潰天下之大防而其聞望又足以行其學術為天下後世人心害良亦不細是故有異端之異端有吾儒之異端異端之異端真非也其害小吾儒之異端似是也其害大有衛道之心者如之何其不辨哉發不中節過不在已發之後相在爾室尚不愧於屋漏此是千古嚴師十目所視十手所指此是千古嚴刑誠與才合畢竟是兩箇原無此理蓋才自誠出才不出於誠算不得箇才誠了自然有才今人不患無才只是討一誠字不得宇宙內原來是一箇才說同便不是人欲擾害天理衆人都曉得天理擾害天理雖君子亦迷况在衆人而今只說慈悲是仁謙恭是禮不取是廉慷慨是義果敢是勇然諾是信這箇念頭真實發出難說不是天理却是大中至正天理被他擾害正是執一賊道舉世所謂君子者都在這裏看不破故曰道之不明也士之於道也始也求得既也得得既也養得既也忘得不養得則得也不固不忘得則得也未融學而至於忘得是謂無得得者自外之名還我故物如未嘗失何得之有心放失故言得心從古未言得耳目口鼻四肢者無失故也只隔一絲便算不得透徹之悟須是入筋肉沁骨髓宇宙內主張萬物底只是一塊氣氣即是理理者氣之自然者也義襲取不得任是千變萬化千奇萬異畢竟落在平常處歇物欲從氣質來只變化了氣質更說甚物欲耳目口鼻四肢有何罪過堯舜周孔之身都是有底聲色貨利可愛可欲有何罪過堯舜周孔之世都是有底千萬罪惡都是這㸃心孟子耳目之官不思而蔽於物太株連了只是先立乎其大有了張主小者都是好奴婢何小之敢奪沒了窩主那怕盜賊問誰立大曰心立大潔矩是强恕事聖人不潔矩他這一副心腸原與天下打成一片那箇是矩那箇是潔內外本末交相培養此語余所未喻只有內與本那外末張主得甚處明燭幽未能見物而物先見之矣處幽燭明是謂神照是故不言者非喑不視者非盲不聽者非聾惟得道之深然後能淺言凡深言者得道之淺者也道非淡不入非靜不進非冷不凝三千三百便是無聲無臭天德王道不是兩事內聖外王不是兩人形用事則神者亦形神用事則形者亦神中是千古道脈宗敬是聖學一字訣人事就是天命我盛則萬物皆為我用我衰則萬物皆為我病盛衰勝負宇宙內只有一箇消息義合外內之道也外無感則義只是渾然在中之理見物而裁制之則為義義不生於物亦緣物而後見告子只說義外故孟子只說義內各說一邊以相駁故窮年相辨而不服孟子若說義雖緣外而形實根吾心而生物不是義而處物乃為義也告子再怎開口性合理氣之道也理不雜氣則純粹以精有善無惡所謂義理之性也理一雜氣則五行紛揉有善有惡所謂氣質之性也諸家所言皆落氣質之後之性孟子所言皆未著氣質之先之性各指一邊以相駁故窮年相辨而不服孟子若說有善有惡者雜於氣質之性有善無惡者上帝降衷之性學問之道正要變化那氣質之性完復吾降衷之性諸家再怎開口理㑹得簡之一字自家身心天地萬物天下萬事盡之矣一粒金丹不載多藥一分銀魂不攜錢幣耳聞底眼見底身觸頭戴足踏底燦然確然無非都是這箇拈起一端來色色都是這箇却何古人千言萬語陳爛葛藤鑽研窮究意亂神昏了不可得則多言之誤後人也噫鬼神無聲無臭而有聲有臭者乃無聲無臭之散殊也故先王以聲臭為感格鬼神之妙機周人尚臭商人尚聲自非達幽明之故者難以語此使人收斂莊重莫如禮使人溫厚和平莫如樂德性之有資於禮樂猶身體之有資於衣食極重大極急切人君治天下士君子治身惟禮樂之用為急耳自禮廢而惰慢放肆之態慣習於身體矣自樂亡而乖戾忿恨之氣充滿於一腔矣三代以降無論無秩之本聲氣之元即儀文器數夢寐不及悠悠六合貿貿百年豈非靈於萬物而萬物且能笑之細思先儒不可斯須去身六字可為流涕長太息矣惟平脈無病七表八裏九道皆病名也惟中道無名五常百行萬善皆偏名也百姓凍餒謂之國窮妻子困乏謂之家窮氣血虛弱謂之身窮學問空疏謂之心窮悟有頓修無頓立志在堯即一念之堯一語近舜即一言之舜一行師孔即一事之孔而况悟乎若成一箇堯舜孔子非真積力久斃而後已不能有人於此其孫呼之曰祖其祖呼之曰孫其子呼之曰父其父呼之曰子其舅呼之曰甥其甥呼之曰舅其伯叔呼之曰姪其姪呼之曰伯叔其兄呼之曰弟其弟呼之曰兄其翁呼之曰壻其壻呼之曰翁畢竟是幾人曰一人也呼之畢竟孰是曰皆是也噫仁者見之謂之仁知者見之謂之知無怪矣道二乎哉豪放之心非道之所棲也是故道凝於寧靜聖人制規矩不制方圓謂規矩可為方圓方圓不能為方圓耳終身不照鏡終身不認得自家乍照鏡猶疑我是别人常磨常照才認得本來面目故君子不可以無友天地人物原來只是一箇身體一箇心腸同了便是一家異了便是萬類而今看著風雲雷雨都是我胸中發出虎豹蛇蝎都是我身上分來那箇是天地那箇是萬物或問敬之道曰外面整齊嚴肅內面齊莊中正是靜時涵養的敬讀書則心在於所讀治事則心在於所治是主一無適的敬出門如見大賓使民如承大祭是隨事小心的敬或曰若笑談歌咏宴息造次之時恐如是則矜持不泰然矣曰敬以端嚴為體以虛和為用以不離於正為主齊日衣冠而寢夢寐乎所祭者也不齊之寢則解衣脫冕矣未有釋衣冠而持敬也然而心不流於邪僻事不詭於道義則不害其為敬矣君若專去端嚴上求敬則荷鋤負畚執轡御車鄙事賤役古聖賢皆為之矣豈能日日手容恭足容重耶又若孔子曲肱指掌及居不容㸃之浴沂何害其為敬耶大端心與正依事與道合雖不拘拘於端嚴不害其為敬茍心遊千里意逐百欲而此身却兀然端嚴在此這是敬否譬如謹避深藏秉燭鳴珮緩步輕聲女教內則原是如此所以養貞信也若饁婦汲妻及當顛沛奔走之際自是回避不得然而貞信之守與深藏謹避者同是何害其為女教哉是故敬不擇人敬不擇事敬不擇時敬不擇地只要箇心與正依事與道合自非生知之聖未有言而不思者貌深沈而言安定若蹇若疑欲發欲留雖有失焉者寡矣神奮揚而語急速若湧若懸半跲半晦雖有得焉者寡矣夫一言之發四面皆淵阱也喜言之則以為驕戚言之則以為懦謙言之則以為諂直言之則以為陵微言之則以為險明言之則以為浮無心犯諱則謂有心之譏無為發端則疑有為之說簡而當事曲而當情精而當理確而當時一言而濟事一言而服人一言而明道是謂修辭之善者其要有二曰澄心曰定氣余多言而無當真知病本云云當與同志者共改之不是與諸君不談奧妙古今奧妙不外易與中庸至今解說二書不似青天白日如何又與晦夜添濃雲也望諸君哀此後學另說一副確當言語須是十指露縫八面開窗你見我知更無躲閃方是正大光明男子輕重只在毫釐長短只爭分寸明者以少為多昏者惜零棄頓修身類六合是我底六合那箇是人我是六合底我那箇是我作人怕似渴睡漢才喚醒時睜眼若有知旋復沈困竟是夢中人須如朝興櫛盥之後神爽氣清泠泠徑徑方是真醒廣所依不如擇所依擇所依不如無所依無所依者依天也依天者有獨知之契雖獨立宇宙之內而不謂孤衆忌之衆毁之而不為動此之謂男子小屈以求大伸聖賢不為吾道非必大行之日然後見便是抱關擊柝自有不可枉之道松柏生來便直士君子窮居便正在下位遇難事姑韜光忍恥以圖他日貴達之時然後直躬行道此不但出處為兩截人即既仕之後又為兩截人矣又安知大任到手不放過耶才能技藝讓他占箇高名莫與角勝至於綱常大節則定要自家努力不可退居人後人不難於違衆而難於違已能違已矣違衆何難學欲博技欲工難說不是一長總較作人只是夠了便止學如班馬字如鍾王文如曹劉詩如李杜錚錚千古知名只是箇小藝習所貴在做好人士君子之偶聚也不言身心性命則言天下國家不言物理人情則言風俗世道不規目前過失則問平生德業傍花隨柳之間吟風弄月之際都無鄙俗媟嫚之談謂此心不可一時流於邪僻此身不可一日令之偷惰也若一相逢不是䙝狎便是亂講此與僕𨽻下人何異只多了這衣冠耳往見泰山喬嶽以立身四語甚愛之疑有未盡因推廣為男兒八景云泰山喬嶽之身海濶天空之腹和風甘雨之色日照月臨之目旋乾轉坤之手磐石砥柱之足臨深履薄之心玉潔冰清之骨此八景豫甚愧之當與同志者竭力從事焉少年只要想我見在幹些甚麼事到底成箇甚麼人這便有多少恨心多少愧汗如何放得自家過有象而無體者畫人也欲為而不能為有體而無用者塑人也清淨尊嚴享犧牲香火而一無所為有運動而無知覺者偶人也待提掇指使而後為此三人者身無氣血心無靈明吾無責矣兩柔無聲合也一柔無聲受也兩剛必碎激也一剛必損積也故易取一剛一柔是謂平中以成天下之務以和一身之德君子尚之士君子作人不長進只是不用心不著力其所以不用心不著力者只是不愧不奮能愧能奮聖人可至有道之言得之心悟有德之言得之躬行有道之言宏暢有德之言親切有道之言如遊萬貨之肆有德之言如發萬貨之商有道者不容不言有德者無俟於言雖然未嘗不言也故曰有德者必有言或問不怨不尤了恐於事天處人上更要留心否曰這天人兩項千頭萬緒如何照管得來有箇簡便之法只在自家身上做一念一言一事都㸃檢得莫我分毫不是那禍福毁譽都不須理㑹我無取禍之道而禍來自有天擔錯我無致毁之由而毁來自有人擔錯與我全不干涉若福與譽是我應得底我不加喜是我幸得底我且惶懼愧赧况天也有力量不能底人也有知識不到底也要體悉他却有一件緊要生怕我不能格天動物這箇稍有缺缺自怨自尤且不暇又那顧得别箇孔子說箇上不怨下不尤是不願乎其外道理孟子說箇仰不愧俯不作是素位而行道理此二意常相須奮始怠終修業之賊也緩前急後應事之賊也躁心浮氣蓄德之賊也疾言厲色處衆之賊也名心勝者必作僞恭敬謙謹此四字有心之善也狎侮傲凌此四字有心之惡也人所易知也至於怠忽惰慢此四字乃無心之失耳而丹書之戒怠勝敬者凶論治忽者至分存亡大學以傲惰同論曽子以暴慢連語者何哉蓋天下之禍患皆起於四字一身之罪過皆生於四字怠則一切茍且忽則一旦昏忘惰則一切疏懶慢則一切延遲以之應事則萬事皆廢以之接人則衆心皆離古人臨民如馭朽索使人如承大祭况接平交以上者乎古人處事不泄邇不忘逺况目前之親切重大者乎故曰無衆寡無小大無敢慢此九字即毋不敬毋不敬三字非但聖狂之分存亡治亂死生禍福之關也必然不易之理也沈心精應者始真知之貧不足羞可羞是貧而無志賤不足惡可惡是賤而無能老不足嘆可嘆是老而虛生死不足悲可悲是死而無聞時時體悉人情念念持循天理禮義之大防壞於衆人一念之茍譬如由徑之人只為一時倦行幾步便平踏破一條蹊徑後來人跟尋舊跡踵成不可塞之大道是以君子當衆人所驚之事略不動容才干礙禮義上些須便愕然變色若觸大刑憲然懼大防之不可潰而微端之不可開也嗟夫此衆人之所謂迂而不以為重輕者也此開天下不可塞之釁者自茍且之人始也有德之容深沈凝重內充然有餘外閒然無迹若面目都是精神即不出諸口而漏泄已多矣畢竟是養得浮淺譬之無量人一杯酒便達於面目權貴之門雖係通家知己也須見面稀行踪少就好嘗愛唐詩有終日帝城裏不識五侯門之句可為新進之法仁厚刻薄是修短關行止語默是禍福關勤惰儉奢是成敗關飲食男女是死生關世有十態君子免焉無武人之態粗豪無婦人之態柔懦無兒女之態嬌稚無市井之態貪鄙無俗子之態庸陋無蕩子之態儇佻無伶優之態滑稽無閭閻之態村野無堂下人之態局迫無婢子之態卑諂無偵諜之態詭暗無商賈之態衒售不善之名每成於一事後有諸長不能掩也而惟一不善傳君子之動可不慎與先王之禮文用以飾情後世之禮文用以飾僞飾情則三千三百雖至繁也不害其為率真飾僞則雖一揖一拜己自多矣後之惡飾僞者乃一切茍簡決裂以潰天下之防而自謂之率真將流於伯子之簡而不可行又禮之賊也余待小人不能假辭色小人或不能堪年友王道源危之曰今世居官切宜戒此法度是朝廷的財貨是百姓的真做不得人情至於辭色却是我的假借些兒何害余深感之因識而改焉一友與人爭而厯指其短豫曰於十分中君有一分不是否友曰我難說沒一二分豫曰且將這一二分都沒了才好責人士大夫殃及子孫者有十一曰優免太侈二曰侵奪太多三曰請託滅公四曰恃勢凌人五曰困纍鄉黨六曰要結權貴損國病人七曰盜上剝下以實私槖八曰簧鼓邪說搖亂國是九曰樹黨報復隂中善人十曰引用邪昵虐民病國智者不與命鬭不與法鬭不與理鬭不與勢鬭入廟不期敬而自敬入朝不期肅而自肅是以君子慎所入也見嚴師則收斂見狎友則放恣是以君子慎所接也涵養如培脆萌省察如搜田蠧克治如去盤根涵養如女子坐幽閨省察如邏卒緝奸細克治如將軍戰勍敵涵養用勿忘勿助工夫省察用勿怠勿荒工夫克治用是絶是忽工夫恣縱既成不惟禮法所不能制雖自家悔恨亦制自家不得善愛人者無使恣縱善自愛者亦無使恣縱士君子澡心浴德要使咳唾為玉便溺皆香才見工夫圓滿若靈臺中有一㸃汚濁便如瓜蒂藜蘆入胃不嘔吐盡不止豈可使一刻容留此中耶夫如是然後溷厠可沈緇泥可入猥繁拂逆生厭惡心奮寧耐之力柔艷芳濃生沾惹心奮跳脫之力推挽衝突生隨逐心奮執持之力長途末路生衰歇心奮鼓舞之力急遽疲勞生茍且心奮敬慎之力無以小事動聲色䙝大人之體其惡惡不嚴者必有惡於己者也其好善不亟者必無善於己者也仁人之好善也不啻口出其惡惡也迸諸四夷不與同中國孟子曰無羞惡之心非人也則惡惡亦君子所不免者但恐為己私作惡在他人非可惡耳若民之所惡而不惡謂為民之父母可乎懶散二字立身之賊也千德萬業日怠廢而無成千罪萬惡日橫恣而無制皆此二字為之西晉讐禮法而樂豪放病本正在此安肆日偷安肆懶散之謂也此聖賢之大戒也甚麼降伏得此二字曰勤慎勤慎者敬之謂也或問修己之道曰無鮮克有終問治人之道曰無忿疾於頑靜定後看自家是甚麼一箇人余參政東藩日與年友張督糧臨碧在座余以朱判封筆濃字大臨碧曰可惜可惜余擎筆舉手曰年兄此一念天下受其福矣判筆一字所費絲硃耳積日積嵗省費不知幾萬倍充用硃之心萬事皆然天下各衙門積日積嵗省費又不知幾萬倍且心不侈然自放足以養德財不侈然浪費足以養福不但天物不宜暴殄民膏不宜慢棄而已夫事有重於費者過費不為奢省有不廢事者過省不為吝余在撫院日不儉於紙而戒示吏書片紙皆使有用比見富貴家子弟用財貨如泥沙長餘之惠既不及人有用之物皆棄於地胸中無不忍一念口中無可惜兩字人或勸之則曰所值幾何余嘗號為溝壑之鬼而彼方侈然自快以為大手段不小家勢痛哉兒曹志之今人苦不肯謙只要拿得架子定以為存體夫子告子張從政以無小大無衆寡無敢慢為不驕而周公為相吐握下白屋甚者父師有道之君子不知損了甚體若名分所在自是貶損不得清無事澄濁降則自清禮無事復己克則自復去了病便是好人去了雲便是晴天要得富貴福澤天主張由不得我要做賢人君子我主張由不得天為惡再沒箇勉强底為善再沒箇自然底學者勘破此念頭寧不愧奮不為三氏奴婢便是兩間翁主三氏者何一曰氣質氏生來氣稟在身舉動皆其作使如勇者多暴戾懦者多退怯是已二曰習俗氏世態既成賢者不能自免只得與世浮沈與衆依違明知之而不能獨立三曰物欲氏滿世皆可殢之物每日皆徇欲之事沈痼留連至死不能跳脫魁然七尺之軀奔走三家之門不在此則在彼降志辱身心安意肯迷戀不能自知即知亦不愧憤大丈夫立身天地之間與兩儀參為萬物靈不能挺身自豎而依門傍户於三家轟轟烈烈以富貴利達自雄亦可憐矣余即非忠臧義獲亦豪奴悍婢人也咆哮躑躅不能解粘去縛安得挺然脫然獨自當家為兩間一主人翁可嘆可恨亡我者我也我不自亡誰能亡之自家作人自家十分曉底乃虛美薰心而喜動顔色是謂自欺别人作人自家十分曉底乃明知其惡而譽侈口頰是謂欺人此二者皆可恥也知覺兩字奚趐天淵致了知才覺覺了才算知不覺算不得知而今說瘡痛人人都知惟病瘡者謂之覺今人為善去惡不成只是不覺覺後便由不得不為善不去惡順其自然只有一毫矯强便不是得其本有只有一毫增益便不是度之於長短也權之於輕重也不爽毫髮也要箇掌尺提稱底四端自有分量擴充到盡處只滿得原來分量再增不得些子見義不為立志無恆只是腎氣不足清人不借外景為襟懷高士不以塵識染情性古之士民各安其業䇿勵精神㸃檢心事晝之所為夜而思之又思明日之所為君子汲汲其德小人汲汲其業日纍月進旦興晏息不敢有一息惰慢之氣夫是以士無慆德民無怠行夫是以家給人足道明德積身用康强不即于禍今也不然百畝之家不親力作一命之士不治常業浪談邪議聚笑覔歡耽心耳目之玩騁情遊戲之樂身依綺縠口厭芻豢志溺驕佚懵然不知日用之所為而其室家土田百物往來之費又足以荒志而養其淫消耗年華妄費日用噫是亦名為人也無惑乎後艱之踵至也難管底是任意難防底是慣病此處著力便是穴上著針癢處著手問學讀書人最怕誦底是古人語做底是自家人這等讀書雖閉户十年破卷五車成甚麼用能辨真假是一種大學問世之所抵死奔走者皆假也萬古惟有真之一字磨滅不了蓋藏不了此鬼神之所把握風雷之所呵護天地無此不能發育聖人無此不能參贊朽腐得此可為神奇鳥獸得此可為精怪道也者道此也學也者學此也不由心上做出此是噴葉學問不在獨中慎起此是洗面工夫成得甚事上吐下㵼之疾雖日進飲食無補於憔悴入耳出口之學雖日事講究無益於身心學者只是氣盈便不長進含六合如一粒覔之不見吐一粒於六合出之不窮可謂大人矣而自處如庸人初不自表異退讓如空夫初不自滿足抵掌攘臂而視世無人謂之以善服人則可勸學者歆之以利名勸善者歆之以福祥哀哉工夫全在冷清時力量全在濃艷時自天子以至於庶人自堯舜以至於途之人必有所以汲汲皇皇者而後其德進其業成故曰雞鳴而起舜跖之徒皆有所孳孳也無所用心孔子憂之曰不有博奕者乎懼無所孳孳者不舜則跖也今之君子縱無所用心而不至於為跖然飽食終日惰慢彌年既不作山林散客又不問廟堂急務如醉如癡以了日月易所謂君子進德修業欲及時也果是之謂乎如是而自附於清品高賢吾不信也孟子論厯聖道統心傳不出憂勤惕勵四字其最親切者曰仰而思之夜以繼日幸而得之坐以待旦此四語不獨作相士農工商皆可作座右銘也今之為舉子文者遇為學題目每以知行作比試思知箇甚麼行箇甚麼遇為政題目每以教養作比試問做官養了那箇教了那箇若資口舌浮談以自致其身以要國家寵利此與誆騙何異吾輩亦惕然省矣世間無一件可驕人之事才藝不足驕人德行是我性分事不到堯舜周孔便是缺缺缺缺便自可恥如何驕得人聖學下手處是無不敬住腳處是恭而安已所獨知儘是方便人所不見儘得自由君子必兢兢然細行必謹小物不遺者懼工夫之間斷也懼善念之停息也懼私欲之乘間也懼自欺之萌蘖也懼一事茍而其餘皆茍也懼閒居忽而大庭亦忽也故廣衆者幽獨之證佐言動者意念之枝葉意中過獨處疏而十目十手能指視之者枝葉證佐上得之也君子奈何其慢獨不然茍且於人不見之時而矜持於視爾友之際豈得自然豈能周悉徒爾勞心而慎獨君子見其肺肝矣屋漏之地可服鬼神室家之中不厭妻子然後謂之真學真養勉强於大庭廣衆之中幸一時一事不露本象遂稱之曰賢人君子恐未必然冰見烈火吾知其易盡也然而以熾炭鑠堅冰必舒徐而後盡盡為寒水又必待舒徐而後溫溫而沸湯又必待舒徐而後竭夫學豈有速化之理哉是故善學者無躁心有事勿忘從容以俟之而已善學者如閙市求前摩肩重足得一步便緊一步學識一分不到便有一分遮障譬之掘河分隔一土界不通便有一段流不去須是衝開要一㸃礙不得涵養一分不到便有一分氣質譬之燒炭成熟一分木未透便是一分烟不止須待燒透要一㸃烟也不得除了中字再沒道理除了敬字再沒學問强恕是最拙的學問三近人皆可行下此無工夫矣體認要嘗出悅心真味工夫更要進到百尺竿頭始為真儒向與二三子暑月飲池上因指水中蓮芳以談學問曰山中人不識蓮於藥鋪買得乾蓮肉食之稱美後入市買得久摘鮮蓮食之更稱美也余嘆曰渠食池上新摘美當何如一摘出池真味猶漓若卧蓮舟挽碧筒就房而裂食之美更何如今之體認皆食乾蓮肉者也又如這樹上胡桃連皮吞之不可謂之不喫不知此果須去厚肉皮不則麻口再去哽骨皮不則損牙再去瓤上粗皮不則澀舌再去薄皮內萌皮不則缺細膩如是而漬以蜜煎以糖始為盡美今之工夫皆囫圇吞胡桃者也如此體認始為精義入神如此工夫始為義精仁熟學問之道便是正也怕雜不一則不真不真則不精入萬景之山處處堪遊我原要到一處只休亂了腳入萬花之谷朵朵堪觀我原要折一枝只休花了眼日落趕城門遲一腳便關了何處止宿故學貴及時懸崖抱孤樹鬆一手便脫了何處落身故學貴著力故傷悲於老大要追時除是再生既失於將得要仍前除是從頭學問要訣只有八箇字涵養德性變化氣質守住這箇更莫向迷津問渡有希天之學有達天之學有合天之學有為天之學㸃檢將來無愧心無悔言無恥行胸中何等快樂只苦不能所以君子有終身之憂常見王心齊學樂歌心頗疑之樂是自然養盛所致如何學得除不了我算不得學問塞乎天地之間儘是浩然了愚謂根荄須栽入九地之下枝梢插入九天之上橫拓須透過八荒之外才是箇圓滿工夫無量學問應物人定真足勝天今人但委於天而不知人事之未定耳夫冬氣閉藏不能生物而老圃能開冬花結春實物生蠢愚不解人事而鳥師能使雀奕棋蛙教書况於能為之人事而可委之天乎衆人之所混同賢者執之賢者之所束縛聖人融之做天下好事既度德量力又審勢擇人專欲難成衆怒難犯此八字者不獨妄動人宜慎雖以至公無私之心行正大光明之事亦須調劑人情發明物理俾大家信從然後動有成事可久盤庚遷殷武王伐紂三令五申猶恐弗從蓋恆情多暗於逺識小人不便於己私羣起而壞之雖有良法胡成胡久自古皆然故君子慎之辨學術談治理直須窮到至處讓人不得所謂宗廟朝廷便便言者蓋道理古今之道理政事國家之政事務須求是乃已我兩人皆置之度外非求伸我也非求勝人也何讓人之有只是平心易氣為辨家第一法才聲高色厲便是沒涵養五月繅絲正為寒時用八月績麻正為暑時用平日涵養正為臨時用若臨時不能駕馭氣質張主物欲平日而曰我涵養吾不信也夫涵養工夫豈為涵養時用哉故馬蹶而後求轡不如操持之有常輻折而後為輪不如約束之有素其備之也若迂正為有時而用也因之一字妙不可言因利者無一錢之費因害者無一力之勞因情者無一念之拂因言者無一語之爭或曰不幾於徇乎曰此轉人而徇我者也或曰不幾於術乎曰此因勢而利導者也故惟聖人善用因智者善用因天下之物紆徐柔和者多長迫切躁急者多短故烈風驟雨無崇朝之威暴漲狂瀾無三日之勢催拍促調非百板之聲疾䇿緊銜非千里之轡人生夀夭禍福無一不然𥚹急者可以思矣幹天下事無以期限自寬事有不測時有不給常有餘於期限之內有多少受用處將事而能弭當事而能救既事而能挽此之謂達權此之謂才未事而知其來始事而要其終定事而知其變此之謂長慮此之謂識任難任之事要有力而無氣處難處之人要有知而無言善處世者要得人自然之情得人自然之情則何所不得失人自然之情則何所不失不惟帝王為然雖二人同行亦離此道不得人有言不能達意者有其狀非其本心者有其言貌誣其本心者君子觀人與其過察而誣人之心寧過恕以逃人之情人情天下古今所同聖人防其肆特為之立中以的之故立法不可太激制禮不可太嚴責人不可太盡然後可以同歸於道不然是驅之使畔也天下之事有速而迫之者有遲而耐之者有勇而劫之者有柔而折之者有憤而激之者有喻而悟之者有奬而歆之者有甚而淡之者有順而緩之者有積誠而感之者要在相機因時舛施未有不敗者也論眼前事就要說眼前處置無追既往無道逺圖此等語雖精無禆見在也我益智人益愚我益巧人益拙何者相去之逺而相責之深也惟有道者智能諒人之愚巧能容人之拙知分量不相及而人各有能不能也僕𨽻下人昏愚者多而理㑹人意動必有合又千萬人不一二也居上者往往以我責之不合則艴然怒甚者繼以鞭笞則彼愈惶惑而錯亂愈甚是我之過大於彼也彼不明而我當明也彼無能事上而我無量容下也彼無心之失而我有心之惡也若忍性平氣指使而面命之是兩益也彼我無苦而事有濟不亦可乎詩曰匪怒伊教書曰無忿疾於頑此學涵養氣質第一要務也論理要精詳論事要剴切論人須帶二三分渾厚若切中人情人必難堪故君子不盡人之情不盡人之過非直逺禍亦以留人掩飾之路觸人悔悟之機養人體面之餘亦天地涵蓄之氣也父母在難盜能為我救之感乎曰此不世之恩也何可以弗感設當用人之權此人求用可薦之乎曰何可薦也天命有德帝王之公典也我何敢以私恩奸之設當理刑之職此人在獄可縱之乎曰何可縱也天討有罪天下之公法也我何敢以私恩骩之曰何以報之曰用吾身時為之死可也用吾家時為之破可也其他患難與之共可也成心者見成之心也聖人胸中洞然清虛無箇見成念頭故曰絶四今人應事宰物都是成心縱是聰明照得破畢竟是意見障凡聽言要先知言者人品又要知言者意向又要知言者識見又要知言者氣質則聽不爽矣不須犯一口說不須著一意念只恁真真誠誠行將去人則有不言之信默成之孚薰之善良遍為爾德者矣堿蓬生於堿地燃之可堿鹽蓬生於鹽地燃之可鹽世人相與非面上則口中也人之心固不能掩於面與口而不可測者則不盡於面與口也故惟人心最可畏人心最不可知此天下之陷阱而古今生死之衢也豫有一拙法推之以至誠施之以至厚持之以至慎逺是非讓利名處厚下則雖若鳥獸可骨肉而腹心矣將令深者且傾心險者且化德而何陷阱之豫及哉不然必豫道之未盡也君子與小人共事必敗君子與君子共事亦未必無敗何者意見不同也今有仁者義者禮者智者信者五人焉而共一事五相濟則事無不成五有主則事無不敗仁者欲寬義者欲嚴智者欲巧信者欲實禮者欲文事胡以成此無他自是之心勝而相持之勢均也厯觀往事每有以意見相爭至亡人國家釀成禍變而不顧君子之罪大矣哉然則何如曰勢不可均勢均則不相下勢均則無忌憚而行其胸臆三軍之事卒伍獻計偏禆謀事主將斷一何意見之敢爭然則善天下之事亦在乎通者當權而已處天下事只消得安詳二字雖兵貴神速也須從此二字做出然安詳非遲緩之謂也從容詳審養奮發於凝定之中耳是故不間則不忙不逸則不勞若先怠緩則後必急躁是事之殃也十行九悔豈得謂之安詳字到不擇筆處文到不修句處話到不檢口處事到不苦心處皆謂之自得自得者與天遇無用之朴君子不貴雖不事機械變詐至於德慧術智亦不可無人情不便處便要回避彼雖難於言而心厭苦之此周至之謂也恤其私濟其願成其名泯其迹體悉之至也感人淪於心骨矣故察言觀色者學之粗也達情㑹意者學之精也或問慮以下人是應得下他不曰若應得下他如子弟之下父兄這何足道然亦不是卑諂而徇人以非禮之恭只是無分毫上人之心把上一著前一步儘著别人占天地間惟有下面底最寬後面底最長輕信驟發聽言之大戒也水之流行也礙於剛則求通於柔智者之於事也礙於此則求通於彼執礙以求通則愚之甚也徒勞而事不濟計天下大事只在要緊處一著留心用力别箇都顧不得譬之奕棋只在輸贏上留心一馬一卒之失渾不放在心下若觀者以此預計其高低奕者以此預亂其心目便不濟事况善籌者以與為取以喪為得善奕者餌之使吞誘之使進此豈尋常識見所能䇿哉乃見其小失而遽沮撓之擯斥之英雄豪傑可為竊笑矣可為慟惋矣夫勢智者之所藉以成功愚者之所逆以取敗者也夫勢之盛也天地聖人不能裁勢之衰也天地聖人不能振亦因之而已因之中寓處之權此善用勢者也乃所以裁之振之也智者之於事有言之而不行者有所言非所行者有先言而後行者有先行而後言者有行之既成而始終不言其故者要亦為國家深逺之慮而求以必濟而已實處著腳穩處下手當事有四要際畔要果決怕是綿執持要堅耐怕是脆機括要深沈怕是淺應變要機警怕是遲朝三暮四用術者誠詐矣人情之極致有以朝三暮四為便者有以朝四暮三為便者要在當其所急猿非愚其中必有所當也有餘當事之妙道也故萬無可慮之事備十一難事備百一大事備千一不則之事備萬一有一介必吝者有千金可輕者而世之論取與動曰所值幾何此亂語耳胸中無一毫缺缺身上無一些㸃染便是羲皇以上人即在險阻患難中何異玉燭春臺上被髮於鄉鄰之鬭豈是惡念頭但類於從井救人矣聖賢不為善於性分之外仕途上只應酬無益人事工夫占了八分更有甚精力時候修正經職業我嘗自喜行三種方便甚於彼我有益不面謁人省其疲於應接不輕寄書省其困於裁答不乞求人看顧省其難於區處天下之事常鼓舞不見罷勞一衰歇便難振舉是以君子提省精神不令昏眊役使筋骨不令怠惰懼振舉之難也君子之處事也要我就事不令事就我其畏民也要我就民不令民就我無謂人唯唯遂以為是我也無謂人默默遂以為服我也無謂人煦煦遂以為愛我也無謂人卑卑遂以為恭我也語云一錯二誤最好理㑹凡一錯者必二誤蓋錯必悔怍悔怍則心疑於所悔不暇他思又錯一事是以無心成一錯有心成二誤也禮節應對間最多此失茍有錯處更宜鎮定不可忙亂一忙亂則相因而錯者無窮矣禍莫大於不讐人而有讐人之辭色恥莫大於不恩人而詐恩人之狀態余少時曽泄當密之語先君責之對曰已戒聞者使勿泄矣先君曰子不能必子之口而能必人之口乎且戒人與戒己孰難小子慎之固可使之愧也乃使之怨固可使之悔也乃使之怒固可使之感也乃使之恨曉人當如是耶不要使人有過你說底是我便從我不從你我自從是何私之有你說底不是我便不從不是不從你我自不從不是何嫌之有日用酬酢事事物物要合天理之情所謂合者如物之有底蓋然方者不與圓者合大者不與小者合欹者不與正者合覆諸其上而不廣不狹旁視其隙而若有若無一物有一物之合不相苦窳萬物各有其合不相假借此之謂天則此之謂大中此之謂天下萬事萬物各得其所而聖人之所以從容中賢者之所以精一求衆人所以醉心夢意錯行亂施者也將祭而齊其思慮之不齊者不惟惡念就是善念也是不該動底這三日裏時時刻刻只在那所祭者身上更無别箇想頭故曰精白一心才一毫雜便不是精白才二便不是一心故君子平日無邪夢齊日無雜夢喫這一箸飯是何人種穫底穿這一匹帛是何人織染底大厦高堂如何該我住居安車駟馬如何該我乘坐獲飽暖之體思作者之勞享尊榮之樂思供者之苦此士大夫日夜不可忘情者也不然其負斯世斯民多矣定靜安慮得此五字時時有事事有離了此五字便是孟浪做公人易公己難公己易公己於人難公己於人易忘人己之界而不知我之為誰難公人處人能公者也公己處己亦公者也至於公己於人則不以我為嫌時當貴我富我泰然處之而不嫌於尊己事當逸我利我公然行之而不嫌於厲民非富貴我逸利我也我者天下之我也天下之名分紀綱於我乎寄則我者名分紀綱之具也何嫌之有此之謂公己於人雖然猶未能忘其道未化也聖人處富貴逸利之地而忘其身為天下勞苦卑困而亦忘其身非曰我分當然也非曰我志欲然也譬痛者之必呻吟樂者之必談笑癢者之必爬搔自然而已譬蟬之鳴樹雞之啼曉草木之榮枯自然而已雖負之使灰其心怒之使薄其意不能也况此分不盡而此心少怠乎况人情未孚而惟人是責乎夫是之謂忘人己之界而不知我之為誰不知我之為誰則亦不知人之為誰矣不知人我之為誰則六合混一而太和元氣塞於天地之間矣必如是而後謂之仁才下手便想到究竟處施者不知受者不知誠動於天之南而心通於海之北是謂神應我意才萌彼意即覺不俟出言可以默㑹是謂念應我以目授之彼以目受之人皆不知兩人獨覺是謂不言之應我固强之彼固拂之陽異而隂同是謂不應之應明乎此者可以談兵矣明義理易識時勢難明義理腐儒可能識時勢非通儒不能也識時易識勢難識時見者可能識勢非蚤見者不能也識勢而蚤圖之自不至於極重何時之足憂舟中失火須思挾法象箸夾水丸須要夾得起中孚妙之至也格天動物不在形迹言語事為之末茍無誠以孚之諸皆糟粕耳徒勤無益於義鳥抱卵曰孚從瓜從子血氣潛入而子隨母化豈在聲色豈事造作學者悟此自不怨天尤人肯替别人想是第一等學問相嫌之敬慎不若相忘之怒詈余行年五十悟得五不爭之味人問之曰不與居積人爭富不與進取人爭貴不與矜飾人爭名不與簡放人爭禮節不與盛氣人爭是非呻吟語摘卷上
