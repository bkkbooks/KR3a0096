body:
  text: 呻吟語摘卷下明吕坤撰外篇天地觀七十二候者謂物知時非也乃時變物耳天地盈虛消息是一個套子萬物生長收藏是一副印板萬物得天地之氣以生有宜溫者有宜微溫者有宜太溫者有宜溫而風者有宜溫而濕者有宜溫而燥者有宜溫而時風時濕者何氣所生則宜何氣得之則長養失之則傷病氣有一毫之爽萬物隂受一毫之病其宜凉宜寒宜暑無不皆然飛潛動植蠛蠓之物無不皆然故天地位則萬物育王道平則萬民遂隂陽合時只管合合極則離離時只管離離極則合不極則不離不合極則必離必合風惟知其吹拂而已雨惟知其淋漓而已霜雪惟知其嚴凝而已水惟知其流行而已火惟知其燔灼而已不足則屏息而各藏其用有餘則猖狂而各恣其性卒然而感則强者勝若兩軍交戰相下而後已是故久隂則權在雨而日月難為明久旱則權在風而雲雨難為澤以至水火霜雪莫不皆然誰為之曰隂陽為之隂陽誰為之曰自然為之生氣醇濃渾濁殺氣清爽澄徹生氣牽戀優柔殺氣果决脆斷生氣寬平溫厚殺氣峻隘凉薄故春氣絪緼萬物以生夏氣薰蒸萬物以長秋氣嚴肅萬物以入冬氣閉藏萬物以亡一呼一吸不得分毫有餘不得分毫不足不得連呼不得連吸不得一呼無吸不得一吸無呼此盈虛之自然也天地發育之氣到無外處止收斂之氣到無內處止不至而止者非本氣不足則客氣相奪也萬物生於隂陽死於隂陽隂陽於萬物原不相干任其自然而已雨非欲潤物旱非欲熯物風非欲撓物雷非欲震物隂陽任其氣之自然而萬物因之以生死耳易稱鼓之以雷霆潤之以風雨另是一種道理不然是天地有心而成化也若有心成化則寒暑災祥得其正乃見天心矣天極從容故三百六十日為一噓吸極次第故溫暑凉寒不驀越而雜至極精明故晝有容光之照而夜有月星極平常寒暑旦夜生長收藏萬古如斯而無新竒之調極含蓄併包萬象而不見其滿塞極沉默無所不分明而無一言極精細色色象象條分縷析而不厭其繁極周匝疏而不漏極凝定風雲雷雨變態於空中悲歡呌號怨德於地下而不惡其擾極通變普物因材不可執為定局極自然任隂陽氣數理勢之所極所生而已不與極堅耐萬古不易而無欲速求進之心消磨曲折之患極勤敏無一息之停極聰明亘古今無一人一事能欺罔之者極老成有虧缺而不隱藏極知足滿必損盛必衰極仁慈雨露霜雪無非生物之心極正直始終計量未嘗養人之奸容人之惡極公平抑髙舉下無貧富貴賤一視同仁極簡易無瑣屑曲局示人以繁難極雅淡青蒼自若更無炫飾極靈爽精誠所至有感必通極謙虛四時之氣常下交極正大擅六合之恩威而不自有極誠實無一毫僞妄心虛假事極有信萬物皆任之而不疑故人當法天人天所生也如之者存反之者亡本其氣而失之也要知道雷霆霜雪都是太和盛德莫如地萬物於地惡道無以加矣聽其所為而莫之憾也負荷生成而莫之厭也故君子卑法地樂莫大焉心就是天欺心便是欺天事心便是事天更不須向蒼蒼上面討天者未定之命命者已定之天天者大家之命命者各物之天命定而吉凶禍福隨之也由不得天天亦再不照管問天地開闢之初其狀何似曰未易形容因指齊前盆沼令滿貯帶沙水一盆投以瓦礫數小塊雜穀豆升許令人攪水渾濁曰此是混沌未分之狀待三日後再來看開闢至日而濁者清矣輕清上浮曰此是天開於子沉底渾泥此是地闢於丑中間瓦礫出露此是山陵是時榖豆芽生月餘而水中小蟲浮沉奔逐此是人與萬物生於寅徹底是水天包乎地之象也地從上下故山上鋭而下廣象量榖堆也氣化日繁華日廣侈日消耗萬物毁而生機微天地雖不毁至亥而又成混沌之世矣隂陽之氣各橫逞於有餘各退縮於不足非相讓也非相妒也各行其自然而已旱而雩水而禜人事當爾乃聖人燮理修省之道積誠所格自足回天然亦非常理也而偶然者欲以貪天功則迋矣兩間氣化總是一副大蒸籠天地之於萬物原是一貫天地之於萬物因之而已矣分毫不與焉世界雖大容得千萬人忍讓容不得一兩個縱橫世運壞世教者不是宦官宫妾不是農工商賈不是衙門市井不是盜賊奸宄世界一般是唐虞時世界黎民一般是唐虞時黎民而治不古若非氣化之罪也士鮮衣美食浮談怪說玩日愒時而以農工為村鄙女傅粉簪花冶容學態袖手樂逰而以勤儉為羞辱官盛從豐供繁文縟節逐奔世態而以教養為迂儒世道可為傷心矣喜殺人是泰愁殺人也是泰泰之人昏惰侈肆泰之事廢墜寬罷泰之風紛華驕蹇泰之前如上水之篙泰之世如髙竿之頂泰之後如下坂之車故否可以致泰泰必至於否故聖人憂泰不憂否否易振泰難持節文度數聖人之所以防肆也僞禮文不如真愛敬真簡率不如僞禮文僞禮文猶足以成體真簡率每至於踰間僞禮文流而為象恭滔天真簡率流而為禮法掃地七賢八達簡率之極也舉世牛馬而晉因以亡近世士風崇尚簡率蕩然無檢嗟嗟吾莫知所終矣六合是個情世界萬物生於情死於情至人無情聖人調情君子制情小人縱情聖賢堯舜功業如此之大道德如此之全孔子稱贊不啻口出在堯舜心上有多少缺然不滿足處道原體不盡心原趂不滿勢分不可强力量不可勉聖人怎放得下是以聖人身囿於勢分力量之中心長於勢分力量之外才覺足了便不是堯舜聖人不强人以太難只是撥轉他一㸃自然底肯心日之於萬形也鑑之於萬象也風之於萬籟也尺度權衡之於輕重長短也聖人之於萬事萬物也因其本然付以自然分毫我無所與焉然後感者常平應者常逸喜亦天怒亦天而吾心之天如故也萬感劻勷衆動轇轕而吾心之天如故也平生無一事可瞞人此是大快樂堯舜雖是生知安行然堯舜自有堯舜工夫學問但聰明睿智千百衆人豈能不資見聞不待思索朱文公云聖人生知安行更無積纍之漸聖人有聖人底積纍豈儒者所能測識哉周子謂聖可學乎曰無欲愚謂聖人不能無欲七情中豈不有欲孔子曰己欲立欲達孟子有曰廣土衆民君子欲之天欲不可無人欲不可有天欲公也人欲私也周子云聖無欲愚云不如聖無私此二字者三氏之所以異也聖人沒自家底見識對境忘情猶分彼我聖人可能入塵不染則境我為一矣而渾然無㸃染所謂入水不溺入火不焚非聖之至者不能也若塵為我役化而為一則天矣聖人學問只是人定勝天聖人之私公衆人之公私聖人無夜氣衣錦尚絅自是學者作用聖人無尚聖人不必天而必我我之天定而天之天隨之生知之聖人不長進學問到孔子地位才算得個通通之外無學問矣聖人因蛛而知罟網非蛛學聖人而作網罟也因蠅而悟作繩非蠅學聖人交足也物者天能聖人者人能品藻獨處看不破忽處看不破勞倦時看不破急遽倉卒時看不破驚憂驟感時看不破重大獨當時看不破吾必以為聖人圈子裏幹實事賢者可能圈子外幹大事非豪傑不能或曰圈子外可幹乎曰世俗所謂圈子外乃聖賢所謂性分內也人守一官官求一稱內外皆若人焉天下可庶幾矣所謂圈子內幹實事者也心切憂世志在匡時茍利天下文法所不能拘茍計成功形迹所不必避則圈子外幹大事者也識髙千古慮周六合挽末世之頺風還先王之雅道使海內復嘗秦漢以前之滋味則又圈子以上人矣世有斯人乎吾將與之共流涕矣乃若硜硜狃衆見惴惴循弊規威儀文辭燦然可觀勤慎謙默居然寡過是人也但可為髙官耳世道奚賴焉黨錮諸君只是𥚹淺無度量身當濁世自處清流譬之涇渭不言自别正當遵海濵而處以待天下之清也却乃名檢自負氣節相髙志滿意得卑視一世而踐踏之譏謗權勢而狗彘之使人畏忌奉承愈熾愈驕積津要之怒潰權勢之毒一朝而成載胥之凶其死不足惜也詩稱明哲保身孔稱默足有容免於刑戮豈貴貨清市直甘鼎鑊如飴哉申陳二子得之郭林宗幾矣顧厨俊及吾道中之罪人也僅愈於卑汚耳若張儉則又李膺范滂之罪人可誅也夫世之頺波明知其當變狃於衆皆為之而不敢動事之義舉明知其當為狃於衆皆不為而不敢動則是亦衆人而已提抱之兒得一果餅未敢輒食母嘗之而後入口彼不知其可食與否也既知之矣猶以衆人為行止可愧也夫惟英雄豪傑不徇習以居非能違俗而任道夫是之謂獨復嗚呼此庸人智巧之士所謂生世而好異者也體解神昏志消氣沮天下事不是這般人幹底攘臂抵掌矢志奮心天下事也不是這般人幹底幹天下事者智深勇沉神閒氣定有所不言言必當有所不為為必成不自好而露才不輕試以幸功此真才也世鮮識之近世惟前二種人乃互相譏識者胥笑之山林處士當養一個傲慢輕人之象常積一腹痛憤不平之氣此是大病痛天之生人雖下愚亦有一竅之明聽其自為用而極致之亦有可觀而不可謂之才所謂才者能為人用可圓可方能隂能陽而不以己用者也以己用皆偏才者也知其不可為而遂安之者達人智士之見也知其不可為而猶力以圖之者忠臣孝子之心也初開口便是煞尾語初下手便是盡頭著此人大無含蓄大不濟事學者戒之今之論人者於辭受不論道義只以辭為是故辭寧矯亷而避貪愛之嫌於取與不論道義只以與為是故與寧傷惠而避吝嗇之嫌於怨怒不論道義只以忍為是故禮雖當校而避無量之嫌義當明分人皆病其諛而以倨傲矜陵為節槩禮當持體人皆病其倨而以過禮足恭為盛德惟儉是取者不辨禮有當豐惟默是貴者不論事有當言此皆察理不精貴賢智而忘其過者也噫與不及者誠有間矣其賊道均也自古聖賢孜孜汲汲惕勵憂勤只是以濟世安民為己任以檢身約己為先圖自有知以至於蓋棺尚有未畢之性分不了之心緣不惟孔孟雖佛老墨者此語人不敢道深於佛老莊列者自默識得鄉原是似不是僞孟子也只定他個似字今人却把似字作僞字看不惟缺確且末減了他罪不當事不知自家不濟才隨遇長識以窮精坐談先生只好說理耳沉溺了如神附如鬼迷全由不得自家不怕你明見真知眼見得深淵陡澗心安意肯底直前撞去到此翻然跳出無分毫粘帶非天下第一大勇不能學者須要知此巢父許由世間要此等人作甚荷蕢晨門長沮桀溺知世道已不可為自有無道則隱一種道理巢由一派有許多人皆汚濁堯舜噦吐臯䕫自謂曠古髙人而不知不仕無義潔一身以病天下吾道之罪人也且世無巢許不害其為唐虞無堯舜臯䕫巢許也沒安頓處誰成就你個髙人而今士大夫聚首時只問我輩奔奔忙忙熬熬煎煎是為天下國家欲濟世安民乎是為身家妻子欲位髙金多乎世之治亂民之死生國之安危只於這兩個念頭定了嗟夫吾輩日多而世益苦吾輩日貴而民日窮世何貴於有吾輩哉夫物愚者真智者僞愚者完智者喪無論人即鳥之返哺雉之耿介鳲鳩均平専一雎鳩和而不流雁之貞靜自守騶虞之仁獬豸之秉正嫉邪何嘗有矯僞哉人亦然人之全其天者皆非智巧者也才智巧則其天漓矣漓則其天可奪惟愚者之天不可奪故求道真當求之愚求不二心之臣以任天下事亦當求之愚夫愚者何嘗不智哉愚者智純正専一之智也面色不浮眼光不亂便知胸中靜定非久養不能禮曰儼若思安定辭善形容有道氣象矣道自孔孟以後無人識三代以上面目漢儒無見於精宋儒無見於大有憂世之實心泫然欲淚有濟世之實才施處輒宜斯人也我願為曳屨執鞭若聚談紙上微言不關國家治忽爭走塵中衆轍不知黎庶死生即品格有清濁均於宇宙無補也任有七難繁任要提綱挈領宜綜核之才重任要審謀獨斷宜鎮靜之才急任要觀變㑹通宜明敏之才密任要藏機相可宜周慎之才獨任要擔當執持宜剛毅之才兼任要任賢取善宜博文之才疑任要內明外暗宜駕馭之才天之生人各有偏長國家之用人備明羣長然而投之所向輒不濟事者所用非所長所長非所用也小亷曲謹之士循塗守轍之人當太平時使治一方理一事儘能奉職若定難決疑應卒蹈險寧用破綻人不用尋常人雖豪悍之魁任俠之雄駕馭有方更足以建竒功成大務噫難與曲局者道今之國語鄉評皆繩人以細行細行一虧若不可容於清議至於大節都脫略廢墜渾不說起道之不明亦至此乎可嘆也已自中庸之道不明而人之相病無終已狷介之人病和易者為罷軟和易之人病狷介者為乖戾率真之人病慎密者為深險慎密之人病率真者為粗疏精明之人病渾厚者為含糊渾厚之人病精明者為苛刻使質於孔子吾知其必有公案矣孔子者合千聖於一身幸萬善於一心隨事而時出之因人而通變之圓神不滯化裁無端其所自為不可以教人者也何也難以言𫝊也見人之為不以備責也何也難以速化也告子許大力量無論可否只一個不動心豈無骨氣人所能可惜只是沒學問所謂其至爾力也千古一條大路堯舜禹湯文武孔孟由之此是官路古路乞人盜跖都有分都由人自不由耳或曰須是跟著數聖人走曰各人走各人路數聖人者走底是誰底路肯實在走腳踪兒自是暗合得人不敢不然之情易得人自然之情難秦漢而後皆得人不敢不然之情者也而今講學不為明道只為角勝字面詞語間拿住一㸃半㸃錯便要連篇纍牘辨個足這是甚麼心腸講甚學問衆人但於義中尋個利字再沒利中尋個義字士君子髙談濶論語細探𤣥皆非實際緊要在適用濟事故今之稱拙鈍者曰不中用稱昏庸者曰不濟事食牛吞象之氣填海移山之志死孝死忠千捶百折未可専望之斯人不做討便宜底學問便是真儒千萬人吾往嚇殺老子老子是保身學問或問某公如何曰可謂豪傑英雄不可謂端人正士問某公如何曰可謂端人正士不可謂達節通儒達節通儒乃端人正士中豪傑英雄者也性分名分不是兩項盡性分底不傲名分召之見不肯見之召之役執往役之事今之講學者凌犯名分自謂髙潔孔子乘田委吏時何嘗不折腰屈膝於大夫之庭乎噫道之不明久矣治道廟堂之上以養正氣為先海宇之內以養元氣為本能使賢人君子無鬱心之言則正氣培矣能使羣黎百姓無腹誹之語則元氣固矣興利無太急要左視右盼革弊無大驟要長慮却顧茍可以柔道理不必悻直也茍可以無為理不必多事也為政之道以不擾為安以不取為與以不害為利以行所無事為興廢起敝從政自有個大體大體既立則小節雖有抵牾當别作張弛以輔吾大體之所未備不可便改絃易轍譬如待民貴有恩此大體也即有頑暴不化者重刑之而待民之大體不變待士有禮此大體也即有淫肆不檢者嚴治之而待士之大體不變彼始之寬也既養士民之惡終之猛也槩及士民之善非政也不立大體故也人情之所易忽莫如漸天下之大可畏莫如漸漸之始也雖君子不以為意有謂其當防者雖君子亦以為迂不知其極重不反之勢天地聖人亦無如之奈何其所由來者漸也周鄭交質若出於驟然天子雖孱懦甚亦必有恚心諸侯雖豪橫極豈敢生此念逮積漸所成其流不覺至是故步視千里為逺前步視後步為近千里者步步之積也是以驟者舉世所驚漸者聖人獨懼明以燭之堅以守之毫髮不以假借此慎漸之道也君子之於風俗也守先王之禮而儉約是崇不妄開事端以貽可長之漸是故漆器不至金玉而刻鏤之不止黼黻不至庶人錦繡被墻屋不止民貧盜起不顧也嚴刑峻法莫禁也是故君子謹其事端不開人情竇而恣小人無厭之欲微者正之甚者從之從微則甚正甚愈甚天地萬物氣化人事莫不皆然是故正微從甚皆所以禁之也此二帝三王之所以治也聖人治天下常令天下之人精神奮發意念斂束奮發則萬民無棄業而兵食足義氣充平居可以勤國有事可以捐軀斂束則萬民無邪行而身家重名檢修世治則禮法易行國衰則姦盜不起後世之民怠惰放肆甚矣臣民而怠惰放肆明主之憂也只有不容己之真心自有不可易之良法其處之未必當者必其思之不精者也其思之不精者必共心之不切者也故有純王之心方有純王之政為人上者只是使所治之民個個要聊生人人要安分物物要得所事事要協宜這是本縣職分遂了這個心才得暢然一霎歡安然一覺睡稍有一民一物一事不妥貼此心如何放得下何者為一郡邑長一郡邑皆待命於我者也為一國君一國皆待命於我者也為天下主天下皆待命於我者也無以答其望何以稱此職何以居此位夙夜汲汲圖維之不暇而暇於於安富尊榮之奉身家妻子之謀一不遂心而淫怒是逞耶天付之以生民之寄寧為盈一己之欲哉試一反思便當愧汗堯舜無不弊之法而恃有不弊之身用救弊之人以善天下之治如此而已今也不然法有九利不能必其無一害法有始利不能必其不終弊嫉才妬能之人惰身利口之士執其一害終弊者訕笑之謀國不切而慮事不深者從而附和之不曰天下本無事安常襲故何妨則曰時勢本難為好動喜事何益至大壞極弊瓦解土崩而後付之天命焉嗚呼國家養士何為哉士君子委質何為哉儒者以宇宙為分內何為哉後世無人才病本只是學政不修而今把作萬分不急之務才振舉這個題目便笑倒人官之無良國家不受其福蒼生且被其禍不知當如何處無治人則良法美意反以殃民有治人則弊習陋規皆成善政故有文武之政須待文武之君臣不然青萍結緑非不良劒也烏號繁弱非不良弓矢也用之非人反以資敵豫觀放賑均田減糶檢災鄉約保甲社倉官牛八政而傷心焉不肖有司自省有餘愧矣一呼吸間四肢百骸無所不到一痛癢間手足心知無所不通一身之故也無論人生即偶提一線而渾身俱動矣一脉之故也守令者一郡縣之線也監司者一省路之線也君相者天下之線也心知所及而四海莫不精神政令所加而天下莫不鼓舞者何提其線故也令一身痛癢而不知覺則為癡迷之心矣手足不顧則為痿痺之手足矣三代以來上下不聨屬久矣是人各一身而家各一情也死生欣戚不相關其罪不在下也夫民懷敢怒之心畏不敢犯之法以待可乘之釁衆心已離而上之人且恣其虐以甚之此桀紂之所以亡也是以明王推自然之心置同然之腹不持其順我者之迹而欲得其無怨我者之心體其意欲而不忍拂知民之心不盡見之於聲色而有隱而難知者在也此所以固結深厚而子孫終必賴之也治世莫先無僞教民只是不爭勢有時而窮始皇以天下全盛之威力受制於匹夫何者匹夫者天子之所恃以成勢者也自傾其勢反為勢所傾故明王不恃蕭墻之防禦而以天下為藩籬德之所漸薄海皆腹心之兵怨之所結袵席皆肘腋之冦故帝王虐民是自虐其身者也愛民是自愛其身者也覆轍滿前而驅車者接踵可慟哉如今天下人譬之驕子不敢熱氣唐突便艴然起怒縉紳稍加綜核則曰苛刻學校稍加嚴明則曰寡恩軍士稍加斂戢則曰凌虐鄉官稍加持正則曰踐踏今縱不敢任怨而廢公法以市恩獨不可已乎如今天下事譬之敝屋輕手推扶便愕然咋舌今縱不敢更張而毁拆以滋壞獨不可已乎公私兩字是宇宙的人鬼關若自朝堂以至閭里只把持得公字定便自天清地寧政清訟息只一個私字擾攘的不成世界天下之存亡係兩字曰天命天命之去就係兩字曰人心聖人聨天下為一身運天下於一心今夫四肢百骸五臟六腑皆吾身也痛癢之微無有不覺無有不顧四海之痛癢豈帝王所可忽哉夫一指之疔如粟可以制人之死命國之存亡不在耳目聞見時聞見時則無及矣此以利害言之耳一身麻木若不是我非身也人君者天下之人君天下者人君之天下而血氣不相通心知不相及豈天立君之意耶三軍要他輕生萬姓要他重生不輕生不能戡亂不重生易與為亂任人不任法此惟堯舜在上五臣在下可矣非是而任人未能不亂者二帝三王非不知通變宜民達權宜事之為善也以為吾嘗御天下則吾身即法也何以法為惟夫後世庸君具臣之不能興道致治暴君邪臣之敢於恣惡肆奸也故大綱細目備載具陳以防檢之以昭示之固知夫今日之畫一必有不便於後世之推行也以為聖子神孫自能師其意而善用於不窮且尤足以濟吾法之所未及庸君具臣相與守之而不敢變亦不失為半得暴君邪臣即欲變亂而辨髦之猶必有所顧忌而法家拂士亦得執祖宗之成憲以匡正其惡而不茍從暴君邪臣亦畏其義正事核也而不敢遽肆則法之不可廢也明矣事有知其當變而不得不因者善救之而已矣人有知其當退而不得不用者善馭之而已矣使衆之道不分職守則分日月然後有所責成而上不勞無所推委而下不奸混呼雜命槩怒偏勞此不可以使二人况衆人乎勤者苦惰者逸訥者寃辨者欺貪者飽亷者飢是人也即為人下且不能而使之為人上可嘆也夫弭盜之末務莫如保甲弭盜之本務莫如教養故斗米十錢夜户不閉足食之效也守遺待主始於盜牛教化之功也夫盜辱名也死重法也而人猶為之此其罪豈獨在民哉而惟城池是恃關鍵是嚴巡緝是密可笑也已百姓只幹正經事不怕衣食不豐足君臣只幹正經事不怕天下不太平試問有司庶府所職者何官終日所幹者何事有道者可以自省矣人才邪正世道為之也世道汚隆君相為之也君人者何嘗不費富貴哉以正富貴人則中人皆化為君子以邪富貴人則君子皆化為中人滿目所見世上無一物不有淫巧這淫巧耗了世上多少生成底財貨誤了世上多少生成底工夫淫巧不誅而欲講理財皆茍且之談也為政之道第一要德感誠孚第二要令行禁止令不行禁不止與無官無政同雖堯舜不能治一鄉而况天下乎印書先要個印板真為陶先要個模子好以邪官舉邪官以俗士舉俗士國欲治得乎而今舉世有一大迷自秦漢以來無人悟得官髙權重原是投大遺難譬如百鈞重擔須尋烏獲來擔連雲大厦須用大木為柱乃朝廷求賢才借之名器以任重非朝廷市私恩假之權勢以榮人也今也崇階重地用者以為榮人重以豫其所愛而固以吝於所疏不論其賢不賢其用者以為榮己未得則眼穿涎流以千人既得則捐身鏤骨以感德不計其勝不勝旁觀者不論其官之稱不稱人之宜不宜而以資淺議驟遷以格卑議冒進皆視官為富貴之物而不知富貴之也欲以何用果朝廷為天下求人耶抑君相為士人擇官耶此三人者皆可憐也叔季之世生人其識見故如此無怪乎宋太宗問劉昌言之涕泣謂吕䝉正之眼穿也漢始興郡守某者御州兵常操之內免操二月繼之者罷操又繼之者常給之外冬加酒銀人五錢又繼之加肉銀人五錢又繼之者加花布銀人一兩倉庫不足括稅給之猶不足履畝加賦給之兵不見德也而民怨又繼之者曰加吾不能而損吾不敢竟無加兵相與鼓譟曰郡長無恩率怨民以叛肆行攻掠元帝命刺史按之報曰郡守不職不能撫鎮軍民而致之叛竟棄市嗟夫當棄市者誰耶識治體者為之傷心矣迂儒識見看得二帝三王事功只似陽春雨露嫗煦可人再無一些冷落嚴肅之氣便是慈母也有訶罵小兒時不知天地只恁陽春成甚世界故雷霆霜雪不備不足以成天威怒刑罰不用不足以成治只五臣耳還要一個臯陶而二十有二人猶有四凶之誅今只把天德王道看得恁秀雅溫柔豈知殺之而不怨便是存神過化處目下作用須是汗吐下後服四君子四物百十劑才是體治兩精兩備兩勇兩智兩愚兩意則多寡强弱在所必較以精乘雜以備乘疏以勇乘怯以智乘愚以有餘乘不足以有意乘不意以決乘二三以合德乘離心以鋭乘疲以慎乘怠則多寡强弱非所論矣故戰之勝負無他得其所乘與人為所乘其得失不啻百也實精也而示之以雜實備也而示之以疏實勇也而示之以怯實智也而示之以愚實有餘也而示之以不足實有意也而示之以不意實有決也而示之以二三實合德也而示之以離心實鋭也而示之以疲實慎也而示之以怠則多寡强弱亦非所論矣故乘之可否無他知其所示知其無所示其得失亦不啻百也故不藏其所示凶也誤中於所示凶也此將家之所務審也居官只一個快性自家討了多少便宜左右省了多少負纍百姓省了多少勞費余佐司冦日有罪人情極可恨而法無以加者司官曲擬重條余不可司官曰非私惡也以懲惡耳余曰謂非私惡誠然謂非作惡可乎君以公惡輕重法安知他日無以私惡輕重法者乎刑部只有個法字刑官只有執字君其慎之濫准株連差拘監禁保甲淹久解審照提此八者獄情之大忌也仁人之所隱也居官者慎之養民之政孟子云老者衣帛食肉黎民不飢不寒韓子云鰥寡孤獨廢疾者皆有養也教民之道孟子云使契為司徒教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信放勳曰勞之來之匡之直之輔之翼之使自得之又從而振德之洪範曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極豫每三復斯言汗輒浹背三嘆斯語淚便交頤嗟夫今之民非古之民乎今之道非古之道乎抑世變若江河世道終不可反乎抑古人絶德後人終不可及乎吾耳目口鼻視古人有何缺缺爵祿事勢視古人有何靳嗇俾六合景象若斯辱此七尺之軀靦靣萬民之上矣德立行成了論不得人之貴賤家之貧富分之尊卑自然上下格心小大象指歷山耕夫有甚威靈氣焰故曰默而成之不言而信存乎德行天下之事要其終而後知君子之用心君子之建立要其成而後見事功之濟否可奈庸人俗識讒夫利口君子才一施設輒生議論或附㑹以誣其心或造言以甚其過是以志趣不堅人言是恤者輒灰心喪氣竟不卒功識見不真人言是聽者輒罷君子之所為不使終事嗚呼大可憤心矣古之大建立者或利於千萬世而不利於一時或利於千萬人而不利於一人或利於千萬事而不利於一事其有所費也似貪其有所勞也似虐其不避嫌也易以招摘取議及其成功而心事如青天白日矣奈之何鑠金銷骨之口奪未竟之施誣不白之心哉嗚呼英雄豪傑冷眼天下之事袖手天下之敝付之長吁冷笑任其腐潰決裂而不之理玩日愒月尸位素餐而茍且目前以全軀保妻子者豈得己哉蓋懼此今之用人只怕無去處不知其病根在來處今之理財只怕無來處不知其病根在去處居官有五要休錯問一件事休屈打一個人休妄費一分財休輕勞一夫力休茍取一文錢兵以死使人者也用衆怒用義怒用恩怒衆怒譬在萬姓也湯武之師是已義怒以直攻曲也三軍縞素是己恩怒感激思奮也李牧犒三軍吳起同甘苦是已此三者用人之心可以死人之身非是皆强驅之也猛虎在前利兵在後以死毆死不戰安之然而取勝者幸也敗與潰者十九民情甚不可鬱也防以鬱水一決則漂屋推山炮以鬱火一發則碎石破木桀紂鬱民情而湯武通之此存亡之大機也有天下者之所夙夜孜孜者也國家之取士以言也固將曰言如是行必如是也及他日效用舉背之矣今閭閻小民立片紙慿一人終其身執所書而責之不敢二何也我之所言昭然在紙筆間也人己據之矣吁執卷上數千言慿滿圍之士大夫且播之天下視小民片紙何如奈之何吾資之以進身人君資之以進人而自處於小民之下也哉噫無怪也彼固以空言求之而終身不復責劵也卑卑世態嫋嫋人情在下者工不以道之悅在上者悅不以道之工奔走揖拜之日多而公務填委簡書酬酢之文盛而民事罔聞時光只有這些時光精神只有這些精神所専在此則所疏在彼朝廷設官本勞已以安民今也擾民以相奉矣與其殺不辜寧失不經此舜時獄也以舜之聖臯陶之明聽比屋可封之民當淳朴未散之世宜無不得其情者何疑而有不經之失哉則知五聽之法不足以盡民而疑獄難決自古有之故聖人寧不明也而不忍不仁今之決獄輒恥不明而以臆度之見偏主之識殺人大可恨也夫天道好生鬼神有知奈何為此故寧錯生了人休錯殺了人錯生則生者尚有悔過之時錯殺則我亦有殺人之罪司刑者慎之大纛髙牙鳴金奏管飛旌捲蓋清道唱騶輿中之人志驕意得矣蒼生之病苦幾何職業之修廢幾何使無愧於心焉即匹馬單車如聽鈞天之樂不然是益厚吾過也婦人孺子豈不驚炫恐有道者笑之故君子之車服儀從足以辨等威而已所汲汲者固自有在也夫治水者通之乃所以窮之塞之乃所以決之也民情亦然故先王引民情於正不裁於法法與情不俱行一存則一亡三代之得天下得民情也其守天下也調民情也順之而使不拂節之而使不過是之謂調進賢舉才而自以為恩此斯世之大惑也退不肖之怨誰其當之失賢之罪誰其當之奉君之命盡己之職而公法廢於私恩舉世迷焉亦可悲矣法多則遁情愈多辟之逃者入千人之羣則不可覔入三人之羣則不可藏矣篤恭之所發事事皆純王如何天下不平或曰才說所發不動聲色乎曰日月星辰皆天之文章風雷雨露皆天之政令上天依舊篤恭在那裡篤恭人之無聲無臭也無聲無臭天之篤恭也無事時惟有丘民好蹂踐自吏卒以上人人得而魚肉之有事時惟有丘民難收拾雖天子亦無躲避處何况衣冠此難與誦詩讀書者道也太和之氣雖貫徹於四時然炎徼以南常熱朔方以北常寒姑無論只以中土言之純然暄燠而無一毫寒凉之氣者惟是五月半後八月半前九十日耳中間亦有夜用夾綿時至七月而暑已處八月而白露零九月寒露霜降亥子丑寅其寒無俟言矣二三月後猶未脫綿榖雨以後始得斷霜四月巳夏猶未清和大都嚴肅之氣歲常十八而草木二月萌芽十月猶有生意乃生育長養不専在於暄燠而嚴肅之中正所以操縱沖和之機者也聖人之為政也法天當寬則用春夏當嚴則用秋冬而常持之體則於嚴威之中施長養之惠何者嚴不匱惠易窮威中之惠鼓舞人羣惠中之惠驕弛衆志子産相鄭鑄刑書誅强宗伍田疇褚衣冠及諸子太叔猶有莫如猛之言可不謂嚴乎乃孔子之評子産則曰惠人也他日又曰子産衆人之母孔子之為政可知矣彼沾沾煦煦尚姑息以養民之惡卒至廢弛玩愒令不行禁不止小人縱恣善良吞泣則孔子之罪人也故曰居上以寬為本未嘗以寬為政嚴也者所以成其寬也故懷寬心不宜任寬政是以懦主殺臣慈母殺子盈天地間只靠二種人為命曰農夫織婦却又沒人重他是自戕其命也酒之為害不可勝紀也有天下者而不知嚴酒禁雖談教養皆茍道耳此可與留心治平者道而今當民窮財盡之時動稱礦稅之害以為事于君父諫之不行總付無可奈何我且就吾輩安民節用以自使者言之飲食入腹三分銀用之不盡而食前方丈總屬暴殄要他何用僕𨽻二人無三十里不肉食者下程飯卓要他何用轎扛人夫吏書馬匹寬然有餘而鼓吹旌旗要他何用下管上簟公座圍裙儘章物采矣而滿房鋪氈要他何用上司新到須要𠫭謁而節夀之日各州縣幣帛下程充庭盈門要他何用前呼後擁不減百人巡捕聽事不缺官吏而司道府官交界送接到處追隨要他何用隨巡司道揖拜之外張筵互欵期㑹不遑而帶道文卷盡取抬隨帶道書吏盡人跟從要他何用官官如此在在如此民間節省一歲儘多此豈朝廷令之如此不得不如此耶吾輩可以深省矣簿書所以防奸也簿書愈多而奸愈黠何也千册萬簿何官經眼不過為左右開打㸃之門廣刁難之計為下司增紙筆之孽為百姓添需索之名舉世昏迷了不經意以為當然一細思之可為大笑有識者裁簿書十之九而上下相安弊端自清矣養士用人國家存亡第一緊要事而今以當故事臣是臯䕫稷契君自然是堯舜民自然是唐虞士君子當自責我是臯䕫稷契否終日悠悠泄泄只說吾君不堯舜弗俾厥后惟堯舜是誰之愧耻我輩髙節厚祿寧不惶汗惟有為上的難今人都容易做聽訟者要知天平未稱物先須是對針則稱物不爽聽訟之時心不虛平色態才有所著中證便有趨向况以辭示之意乎當官先要慎此天下之勢頓可為也漸不可為也頓之來也驟漸之來也逺頓之著力在終漸之著力在始人情一巨卿還家門户不如做官時悄然不樂曰世態炎凉如是人何以堪余曰君自炎凉非獨世態之過也平常淡素是我本來事熱閙紛華是我倘來事君留戀富貴以為當然厭惡貧賤以為遭際何炎凉如之而暇嘆世情哉兩人相非不破家不止只回頭認自家一句錯便是無邊受用兩人自是不反面稽唇不止只溫語稱人一句好便是無限歡欣守禮義者今人以為倨傲工諛佞者今人以為謙恭舉世名公達宦自號儒流亦迷亂相責而不悟大可笑也世間有三利衢壞人心術有四要路壞人氣質當此地而不壞者可謂定守矣君門士大夫之利衢也公門吏胥之利衢也市門商賈之利衢也翰林吏部臺省四要地也有道者處之在在都是真我朝廷法紀做不得人情天下名分做不得人情聖賢通理做不得人情他人事做不得人情我無力量做不得人情以此五者徇人皆妄也君子慎之兩悔無不釋之怒兩求無不合之交兩怨無不成之禍攻人者有五分過惡只攻他三四分不惟彼有餘懼而亦傾心引服足以塞其辨口攻到五分已傷渾厚而我無救性矣若更多一分是貽之以自解之資彼據其一而得五我貪其一而失五矣此言責家之大戒也恕人有六或彼識見有不到處或彼聽聞有未真處或彼力量有不及處或彼心事有所苦處或彼精神有所忽處或彼微意有所在處先此六恕而命之不從教之不改然後可罪也已是以君子教人而後責人體人而後怒人人到無所顧惜時君父之尊不能使之嚴鼎鑊之威不能使之懼千言萬語不能使之喻雖聖人亦無如之何也已聖人知其然也每養其體面體其情私而不使至於無所顧惜有二三道義之交數日别便想思以為世俗之念一别便生親厚之情一别便疏余曰君此語甚有趣向與淫朋狎友滋味回然不同但真味未深耳孔孟顔思我輩平生何嘗一接只今誦讀體認間如朝夕同堂對語如家人父子相依何者心交神契千載一時萬里一室也久之彼我且無孰離孰合孰親孰疏哉若相與而善念生相逺而欲心長即慕一生濟得甚事受病於平日而歸咎於一旦發源於臟腑而求效於皮毛太倉之竭也責窮於囤底大厦之傾也歸罪於一霖物理鴟梟其本聲也如鵲鳩然第其聲可憎聞者以為不祥每彈殺之夫物之飛鳴何嘗擇地哉集屋鳴屋集樹鳴樹彼鳴屋者主人疑之矣不知其鳴于野樹主何人不祥也至於犬人行鼠人言豕人立真大異事然不祥在物無與於人即使於人為凶然亦不過感戾氣而呈兆在物亦莫知所以然耳蓋神鬼愛人每示人以趨避之幾人能恐懼修省則可轉禍為福如景公之退孛星髙宗之枯桑榖妖不勝德理氣必然然則妖異之呈兆即蓍龜之告繇是吾師也何深惡而痛去之哉春夏秋冬不是四個天東西南北不是四個地溫凉寒熱不是四個氣喜怒哀樂不是四個面臨池者不必仰觀而日月星辰可知也閉户者不必逰覽而隂晴寒暑可知也先得天氣而生者本上而末下人是已先得地氣而生者本下而末上草木是已得氣中之質者飛得質中之氣者走得渾淪磅礴之氣質者為山河為巨體之物得遊散纎細之氣質者為蠛蠓蚊蟻蠢動之蟲為苔蘚萍蓬藂蔇之草火不自知其熱氷不自知其寒鵬不自知其大蟻不自知其小相忘於所生也大風無聲湍水無浪烈火無焰萬物無影薰香蕕臭蕕固不可有薰也是多了的不知無臭無臭臭之母也栁炭鬆弱無力見火即盡榆炭稍强火稍烈桑炭强山栗炭更强皆逼人而耐久木死成炭其性自在廣喻劒長三尺用在一絲之銛創筆長三寸用在一端之鋭毫其餘皆無用之羡物也雖然使劍與筆但有其銛者鋭者焉則其用不可施則知無用者有用之資有用者無用之施易牙不能無㸑子歐冶不能無砧手公輸不能無鑽厮茍不能無則與有用者等也若之何而可以相病也著味非至味也故𤣥酒為五味先著色非至色也故太素為五色之主著象非至象也故無象為萬象母著力非至力也故大塊載萬物而不負著情非至情也故太清生萬物而不親著心非至心也故聖人應萬物而不有凡病人面紅如赭髮潤如油者不治蓋萃一身之元氣血脉盡於面目之上也嗚呼人君富四海貧可以懼矣風之初發於谷也拔木走石漸逺而減又逺而弱又逺而微又逺而盡其勢然也使風出谷也僅能振葉拂毛即咫尺不能推行矣京師號令之首也紀法不可以不振也背上有物反顧千萬轉而不可見也遂謂人言不可信若必待自見則無見時矣毫釐之輕斤鈞之所藉以為重者也合勺之微斛斗之所賴以為多者也分寸之短丈尺之所需以為長者也長㦸利於錐而㦸不可以為錐猛虎勇於貍而虎不可以為貍用小者無取於大猶用大者無取於小二者不可以相誚也鑑不能自照尺不能自度權不能自稱囿於物也聖人則自照自度自稱成其為鑑為尺為權而後能妍媸長短輕重天下蒼松古柏與夭桃穠李爭妍重轂鸞鑣與衝車獵馬爭步豈直不能亦可醜矣鎖鑰各有合合則開不合則不開亦有合而不開者必有所以合而不開之故也亦有終日開偶然抵死不開必有所以偶然不開之故也萬事必有故應萬事必求其故窗間一紙能障拔木之風胸前一瓠不溺拍天之浪其所托者然也人有饋一木者家僮曰留以為梁余曰木小不堪也僮曰留以為棟余曰木大不宜也僮笑曰木一也忽病其大又病其小余曰小子聽之物各有宜用也言各有攸當也豈惟木哉他日為余生炭滿爐烘人余曰太多矣乃盡濕之留星星三二㸃欲明欲滅余曰太少矣僮怨曰火一也既嫌其多又嫌其少余曰小子聽之情各有所適也事各有所量也豈惟火哉海投以汚穢投以瓦礫無所不容取其寶藏取其生育無所不與廣博之量足以納觸忤而不驚富有之積足以供採取而不竭聖人者萬物之海也鏡空而無我相故照物不爽分毫若有一絲痕照人面上便有一絲若有一㸃瘢照人面上便有一㸃差不在人面也心體不虛而應物亦然故禪家嘗教人空諸有而吾儒惟有喜怒哀樂未發之中故有發而中節之和人未有洗面而不閉目撮紅而不慮手者此猶愛小體也人未有過簷滴而不疾走踐泥塗而不揭足者此直愛衣履耳七尺之軀顧不如衣履哉乃沉之滔天情欲之海拚於焚林暴怒之場粉身碎體甘心焉而不顧悲夫左手畫圓右手畫方是可能也鼻左受香右受惡耳左聽絲右聽竹目左視東右視西是不可能也二體且難分况一念而可分乎擲髮於地雖烏獲不能使有聲投核於地雖童子不能使無聲人豈能使我輕重哉自輕重耳澤潞之役余與僚友並肩輿日莫矣僚友問輿夫去潞幾何曰五十里僚友憮然少間又問尚有幾何曰四十五里如此者數問而聲愈厲意迫切不可言甚者怒罵余少憩車中既下車戲之曰君費力如許到來與我一般僚友笑曰余口津且竭矣而咽若火始信兄討得便宜多也問卜筮者亦然天下豈有兒不下迫而强自催生之理乎大抵皆揠苗之見也進香呌佛某不禁同僚非之余憮然曰王道荆榛而後蹊徑多彼所為誠非善事而心且福利之為何可弗禁所賴者緣是以自戒而不敢為惡也故歲飢不禁草木之實待年豐彼自不食矣善乎孟子之言曰君子反經而已矣而已矣三字㫖哉妙哉涵蓄多少趣味日食膾炙者日見其美若不可一日無素食三月聞肉味祇覺其腥矣今與膾炙人言腥豈不訝哉鈎吻砒霜也都治病看是甚麼醫了家家有路到長安莫辨東西與南北鐘一鳴而萬户千門有耳者莫不入其聲而聲非不足使鐘鳴於百里無人之野無一人聞之而聲非有餘鐘非人人分送其聲而使之入人人非取足於鐘之聲以盈吾耳此一貫之說也未有有其心而無其政者如漬種之必苗爇蘭之必香未有無其心而有其政者如塑人之無語畫鳥之不飛某嘗與友人論一事友人曰我胸中自有權量某曰雖婦人孺子未嘗無權量只怕他大斗小稱齁鼾驚鄰而睡者不聞垢汚滿背而負者不見被桐以絲其聲兩相借也道不孤成功不獨立無涵養之功一開口動身便露出本象說不得你有灼見真知無保養之實遇外感內傷依舊是病人說不得你有真傳口授磨墨得省身克己之法膏筆得用人處事之法寫字得經世宰物之法或問士希賢賢希聖聖希天何如曰體味之不免有病士賢聖皆志於天而分量有大小造詣有淺深者也譬之適長安者皆志於長安其行有疾遲有止不止耳若曰跬步者希百里百里者希千里則非也故造道之等必由賢而後能聖志之所希則合下便欲與聖人一般言教不如身教之行也事化不如意化之極也事化信信則不勞而教成意化神神則不知而俗變螟蛉語生言化也鳥孚生氣化也鱉思生神化也只一條線把緊要機括提掇得醒滿眼景物都生色到處鬼神都響應地以一氣噓萬物而使之生而物之受其氣者早暮不同則物之性殊也氣無早暮夭喬不同物之體殊也氣無夭喬甘苦不同物之味殊也氣無甘苦紅白不同物之色殊也氣無紅白榮悴不同物之禀遇殊也氣無榮悴盡吾發育之力滿物各足之分量順吾生植之道聽其取足之多寡如此而已聖人之治天下也亦然口塞而鼻氣盛鼻塞而口氣盛鼻口俱塞腹悶而死治河者不可不知也故欲其力大而勢急則塞其旁流欲其力微而勢殺也則多其支派欲其蓄積而有用也則節其急流治天下之於民情也亦然木鐘撞之也有木聲王鼓擊之也有土響未有感而不應者如何只是怨尤或曰亦有感而不應者曰以髮擊鼓以羽撞鐘何應之有四時之氣先感萬物而萬物應所以應者何也天地萬物一氣也故春感而糞壤氣升雨感而礎石先潤磁石動而針轉陽燧映而火生况有知乎格天動物只是這箇道理器械與其備二之不精不如精其一之為約一而精之萬全之慮也我之子我憐之鄰人之子鄰人憐之非我非鄰人之子而轉相鬻育則不死為恩矣是故公衙不如私舍之堅驛馬不如家騎之肥不以我有視之也茍擴其無我之心則垂永逸者不憚今日之一勞惟民財與力之可惜耳奚必我居也懷一體者當使芻牧之常足惟造物生命之可憫耳奚必我乘也嗚乎天下之有我久矣不獨此一二事也學者須要打破這藩籬才成大世界膾炙之處蠅飛滿几而太羹𤣥酒不至膾炙日增而欲蠅之集太羹𤣥酒雖驅之不至也膾炙徹而蠅不得不趨於太羹𤣥酒矣是故返朴還淳莫如崇儉而禁其可欲駝負百鈞蟻負一粒各盡其力也象飲數石鼷飲一勺各充其量也君子之用人不必其效之同各盡所長而已古人云聲色之於以化民末也這個末好容易底近世聲色不行動大聲色大聲色不行動大刑罰才濟得一半事化不化全不暇理㑹常言三代之民與禮教習若有奸宄然後麗刑如腹與粟菽偶一失調治用藥餌後世之民與刑罰習若德化不由日積月纍如孔子之三年王者之必世驟便欣然向道萬萬不能譬之剛腸硬腹之人服大承氣湯三五劑始覺而却以四物四君子補之非不養人殊與疾悖而反生他症矣却要在刑政中兼德禮則德禮可行所謂兼攻兼補以攻為補先攻後補有宜攻有宜補惟在劑量民情不拂不縱始得噫可與良醫道得良醫而撓之與委庸醫而聽之其失均以莫耶授嬰兒而使之禦敵以繁弱授䝉瞍而使之中的其不勝任授者之罪也齊有南北官道汙下者里餘雨多行潦行者不便則傍西踏人田行行數日而成路田家苦之斷以橫墻十步一堵堵數十焉行者避墻更西踏田愈廣數日又成路田家無計乃蹲田邊且泣欲止欲訟而無如多人何也或告之曰墻之所斷已成棄地矣胡不仆墻而使之通猶得省於墻之更西者乎豫笑曰更有竒法以築墻之土墊道則道平矣道平人皆由道又不省於道之西者乎安用墻為越數日道成而道傍無一人跡矣君子之教人也能妙夫因材之術不能變其各具之質譬之地然發育萬物者其性也草得之而為柔木得之而為剛不能使草之為木而木之為草也是故君子以人治人不以我治人羊腸之隘前車覆而後車協力非以厚之也前車當關後車停駕非惟同緩急亦且共利害為人也而實自為也嗚呼士君子共事而忘人之急無乃所以自孤也夫石不入水者堅也磁不入水者密也人身內堅而外密何外感之能入物有一隙水即入一隙物虛一寸水即入一寸頸檠一首足荷七尺終身由之而不覺其重固有之也使他人之首枕我肩他人之身在我足則不勝其重矣不怕炊不熟只恐斷了火火不斷時煉金煮砂可使為水作泥今冷竈清鍋却恁空忙作甚一人入餅肆問餅值幾何館人曰餅一錢一枚食數餅矣錢如數與之館人曰餅不用麵乎應麵錢若干食者曰是也與之又曰不用薪水乎應薪水錢若干食者曰是也與之又曰不用人工乎應人工錢若干食者曰是也與之歸而思於路曰吾愚也哉出此三色錢不應又有餅錢矣以佳兒易一跛子子之父母不從非不辨美惡也各有所愛也發去木一截作神櫝一鏡臺一腳桶一錫五斤造香爐一酒壺一溺器一某嘗入一富室見四海竒珍山積曰某物余取諸蜀某物豫取諸越不逺數千里積數十年以有今日謂余公有此否曰余性無所嗜設有所嗜則百物無足而至前問何以得此曰我只是積錢弄潮於萬層波面進步於百尺竿頭人之手無異於己之手也腋肋足底已摸之不癢而人摸之則癢補之齒不大於己之齒也己之齒不覺塞而補之齒覺塞四腳平穩不須又加搘墊只見倒了墻幾曽見倒了地無垢子浴面拭之以巾既而洗足仍以其巾拭之弟子曰舛矣先生之用物也即不為物分清濁豈不為身分貴賤乎無垢子曰嘻汝何太分别也足未濯時面潔於足足既濯時何殊於面面若不浴面同於足潔足汙面孰貴孰賤余謂弟子曰此禪宗也分别與不分别此孔釋之所以殊也兩家比舍而居南鄰墻頺北鄰為之塗埴丹堊而南鄰不歸德南鄰失火北鄰為之焦頭爛額而南鄰不謝勞喜者大笑而怒者亦大笑哀者痛哭而樂者亦痛哭歡暢者歌而憂思者亦歌逃亡者走而追逐者亦走豈以形論心哉二商渡江俱挾重資舟滿載重而不已也中流遇風舟子曰須減舟中之十二始無恐不然不沉則覆一商曰我竒貨可惜無堪棄者一商從之得達岸一商竟溺焉人貨俱喪其達岸者悔曰可惜減吾千金怨舟子舟子曰不見某乎曰彼命當死減亦死我命不當死不減亦不死乃向舟子索償抱得不哭孩兒易抱得孩兒不哭難疥癬雖小疾只不染在身上就好一到身上難說是無病底人詞章六經之文不相師也而後世不敢軒輊後之為文者吾惑矣擬韓臨栁效馬學班代相祖述竊其糟粕謬矣夫文以載道也茍文足以明道謂吾之文為六經可也何也與六經不相叛也否則發明申韓之學術飾以六經之文法有道君子以之覆瓿矣一先達為文示豫令改之豫謙讓先達曰某不護短即令公笑我只是一人笑若為我回護是令天下笑也豫極服其誠又服其智嗟夫惡一人之面指而安為天下之背笑者豈獨文哉豈獨一二人哉觀此可以悟矣古今載籍之言率有七種一曰天分語身為道鑄心是理成自然而然毫無所為生知安行之聖人二曰性分語理所當然職所當盡務滿分量斃而後已學知利行之聖人三曰是非語為善者為君子為惡者為小人以勸賢者四曰利害語作善降之百祥作不善降之百殃以䇿衆人五曰權變語托詞畫䇿以應務六曰威令語五刑以防淫七曰無奈語五兵以禁亂此語之外皆亂道之談也學者之所務辨也愁紅怨緑是兒女語對白抽黃是騷墨語嘆老嗟卑是寒酸語慕羶附腥是乞丐語艱語深辭險句怪字文章之妖而道之賊也後學之殃而木之災也路本平而山溪之日月本明而雲霧之無異理有異言無深情有深語是人不誡而是書不焚有世教之責者之罪也若曰其人學博而識深意奧而語竒然則孔孟之言淺鄙甚矣聖人不作無用文章其論道則為育德之言其論事則為有見之言其叙述歌詠則為有益世教之言聖人作經有指時物者有指時事者有指方事者有論心事者當時精意與身往矣話言所遺不能寫心之十一而儒者以後世之事物一己之意見度之不得則强為訓詁嗚呼漢宋諸儒不生則先聖經㫖後世誠不得十一然以牽合附㑹而失其自然之㫖者亦不少也聖人垂世則為持衡之言救世則有偏重之言持衡之言達之天下萬世者也可以示極偏重之言因事因人者也可以矯枉而不善讀書者每以偏重之言垂訓亂道也夫誣聖也夫自孔子時便說史不闕文又曰文勝質則史把史字就作了一僞字看如今讀史只看他治亂興亡足為法戒至於是真是僞總是除外底譬之聽戲文一般何須問他真假只是足為感創便於風化有關但有一樁可恨處只緣當真看把僞的當真只緣當僞看又把真底當僞這裏便宜了多少小人虧枉了多少君子文章有八要簡切明盡正大溫雅不簡則失之繁冗不切則失之浮泛不明則失之含糊不盡則失之疏遺不正則理不足以服人不大則失冠冕之體不溫則暴厲刻削不雅則鄙陋淺俗廟堂文要有天覆地載山林文要有仙風道骨征伐文要有吞象食牛奏對文要有忠肝義膽諸如此類可以例求太𤣥雖終身不看亦可自鄉舉里選之法廢而後世率尚詞章唐以詩賦求真才更為可嘆宋以經義取士而我朝因之夫取士以文已為言舉人矣然猶曰言心聲也因文可得其心因心可知其人其文爽亮者其心必光明而察其粗淺之病其文徑直者其人必剛方而察其豪悍之病其文藻麗者其人必文采而察其靡曼之病其文莊重者其人必端嚴而察其寥落之病其文飄逸者其人必流動而察其浮薄之病其文典雅者其人必質實而察其朴鈍之病其文雄暢者其人必揮霍而察其跅弛之病其文溫潤者其人必和順而察其巽軟之病其文簡潔者其人必修謹而察其拘攣之病其文簡潔者其人必精細而察其隱險之病其文冲淡者其人必恬雅而察其懶散之病其文變化者其人必圓通而察其機械之病其文竒巧者其人必聰明而察其怪誕之病其文蒼老者其人必不俗而察其迂腐之病有文之長而無文之病則其人可知矣文即未純必不可棄今也但取其文而已見欲深邃調欲新脫意欲竒特句欲飣餖鍛鍊欲工態度欲俏粉黛欲濃靣皮欲厚是以舉業之家棄理而工辭忘我而徇世剽竊湊泊全無自己神情口語筆端迎合主司好尚沿習之調既成本然之天不露而校文者亦迷於世調取其文而忘其人何異暗摸而辨蒼黃隔壁而察妍媸欲得真才豈不難哉隆慶戊辰永城胡君格誠登第三場文字皆塗抹過多而安鄭給諫大經所取士也人皆笑之後余閲其卷乃嘆曰塗抹即盡棄擲不能何者其荒疏狂誕繩之以舉業自當落地而一段雄偉器度爽朗精神英英然一世豪傑如對其面其人之可收自在文章之外耳胡君不羈之才難挫之氣吞牛食象倒海衝山司理常州佐海剛峯多所調停自非尋常庸衆人惜也以不合世調竟使沉淪余因拈出以為取士者不専在數篇工拙當得之牝牡驪黃之外也左傳國語戰國䇿春秋之時文也未嘗見春秋時人學三代史記漢書西漢之時文也未嘗見班馬學國左今之時文安知非後世之古文而不擬國左則擬史漢陋矣人之棄已而襲人也六經四書三代以上之古文也而不擬者何習見也甚矣人之厭常而喜異也余以為文貴理勝得理何古何今茍理不如人而摹仿於句字之間以希博洽之譽有識者恥之正大光明透徹簡易如天地之為形如日月之垂象足以開物成務足以濟世安民達之天下萬世而無弊此謂天言平易明白切近精實出於吾口而當於天下之心載之典籍而裨於古人之道是謂人言艱深幽僻弔詭探竒不自句讀不能通其文通則無分毫㑹心之理趣不考音韻不能識其字識則皆常行日用之形聲是謂鬼言鬼言者道之賊也木之孽也經生學士之殃也然而世人崇尚之者何逃之怪異足以文凡陋之筆見其怪異易以駭膚淺之目此光明平易大雅君子為之汗顔泚顙而彼方以為得意者也哀哉呻吟語摘卷下
